<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Föräldrapenning Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <style>
    .parent-0 { --pc: #2563eb; --pbg: #eff6ff; --pborder: #bfdbfe; }
    .parent-1 { --pc: #be185d; --pbg: #fdf2f8; --pborder: #fbcfe8; }
    .bar { transition: width 0.3s ease; }
    input[type="number"] { -moz-appearance: textfield; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .tooltip { position: relative; }
    .tooltip .tip { display: none; position: absolute; z-index: 50; bottom: 100%; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: white; padding: 6px 10px; border-radius: 6px; font-size: 12px; white-space: nowrap; margin-bottom: 4px; }
    .tooltip:hover .tip { display: block; }
    .tl-arrow { transition: transform 0.15s; display: inline-block; }
    .tl-arrow.open { transform: rotate(90deg); }
    .collapsible-section summary::-webkit-details-marker { display: none; }
    .collapsible-section .collapsible-chevron { transition: transform 0.2s; }
    .collapsible-section[open] .collapsible-chevron { transform: rotate(180deg); }
    @media (max-width: 768px) { .desktop-only { display: none; } }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

<div class="max-w-[1920px] mx-auto px-4 py-6">
  <header class="mb-6">
    <div class="flex items-center gap-3 mb-2">
      <div class="w-10 h-7 rounded overflow-hidden flex flex-col">
        <div class="flex-1 bg-blue-600"></div>
        <div class="h-[6px] bg-yellow-400"></div>
        <div class="flex-1 bg-blue-600"></div>
      </div>
      <h1 class="text-2xl font-bold text-slate-900">Föräldrapenning Planner</h1>
    </div>
    <p class="text-slate-500 text-sm">Plan parental leave for two parents. Rules based on Försäkringskassan 2026.</p>
  </header>

  <div class="flex flex-col lg:flex-row gap-6 min-h-[calc(100vh-120px)]">
    <div id="left-pane" class="flex-1 lg:flex-[0_0_48%] space-y-4 overflow-y-auto lg:max-h-[calc(100vh-120px)]"></div>
    <div id="right-pane" class="flex-1 lg:flex-[0_0_48%] space-y-4 overflow-y-auto lg:max-h-[calc(100vh-120px)]"></div>
  </div>
</div>

<script>
const FK = {
  SJUK_DAYS_TOTAL: 390,
  LAGSTA_DAYS_TOTAL: 90,
  SJUK_PER_PARENT: 195,
  LAGSTA_PER_PARENT: 45,
  RESERVED_SJUK: 90,
  LAGSTA_DAILY: 180,
  MIN_SJUK_DAILY: 250,
  MAX_SJUK_DAILY: 1259,
  MAX_SGI: 592000,
  FIRST_SJUK_REQUIREMENT: 180,
  SAVE_LIMIT_4YR: 96,
  PRISBASBELOPP: 59200,
};

let _id = 0;
function nextId() { return 'id' + (++_id) + '_' + Date.now().toString(36); }

// --- TAX API ---

const SKV_KOMMUN_URL = 'https://skatteverket.entryscape.net/rowstore/dataset/c67b320b-ffee-4876-b073-dd9236cd2a99';
const SKV_TABELL_URL = 'https://skatteverket.entryscape.net/rowstore/dataset/88320397-5c32-4c16-ae79-d36d95b17b95';
const TAX_YEAR = '2026';
const CACHE_TTL_MS = 7 * 24 * 60 * 60 * 1000;

const taxCache = { kommuner: null, tabeller: {} };

function cacheGet(key) {
  try {
    const raw = localStorage.getItem('skv_' + key);
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL_MS) { localStorage.removeItem('skv_' + key); return null; }
    return data;
  } catch { return null; }
}

function cacheSet(key, data) {
  try { localStorage.setItem('skv_' + key, JSON.stringify({ ts: Date.now(), data })); } catch {}
}

async function fetchAllPages(baseUrl, params, maxPerPage = 500) {
  const all = [];
  let offset = 0;
  while (true) {
    const url = new URL(baseUrl);
    for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
    url.searchParams.set('_limit', maxPerPage);
    url.searchParams.set('_offset', offset);
    const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
    const json = await resp.json();
    all.push(...json.results);
    if (all.length >= json.resultCount || json.results.length < maxPerPage) break;
    offset += json.results.length;
  }
  return all;
}

async function loadKommuner() {
  if (taxCache.kommuner) return taxCache.kommuner;
  const cached = cacheGet('kommuner_' + TAX_YEAR);
  if (cached) { taxCache.kommuner = cached; return cached; }

  const rows = await fetchAllPages(SKV_KOMMUN_URL, { 'år': TAX_YEAR });
  const byKommun = {};
  for (const r of rows) {
    const k = r['kommun'];
    if (!byKommun[k]) byKommun[k] = [];
    byKommun[k].push({
      forsamling: r['församling'],
      inkl: parseFloat(r['summa, inkl. kyrkoavgift']),
      exkl: parseFloat(r['summa, exkl. kyrkoavgift']),
    });
  }
  taxCache.kommuner = byKommun;
  cacheSet('kommuner_' + TAX_YEAR, byKommun);
  return byKommun;
}

async function loadSkattetabell(tabellNr) {
  const key = 'tabell_' + TAX_YEAR + '_' + tabellNr;
  if (taxCache.tabeller[tabellNr]) return taxCache.tabeller[tabellNr];
  const cached = cacheGet(key);
  if (cached) { taxCache.tabeller[tabellNr] = cached; return cached; }

  const rows = await fetchAllPages(SKV_TABELL_URL, { 'år': TAX_YEAR, 'tabellnr': String(tabellNr) });
  const table = rows.map(r => ({
    from: parseInt(r['inkomst fr.o.m.'], 10),
    to: parseInt(r['inkomst t.o.m.'], 10),
    col1: parseInt(r['kolumn 1'], 10) || 0,
    col5: parseInt(r['kolumn 5'], 10) || 0,
    col6: parseInt(r['kolumn 6'], 10) || 0,
  })).sort((a, b) => a.from - b.from);
  taxCache.tabeller[tabellNr] = table;
  cacheSet(key, table);
  return table;
}

function lookupTax(grossMonthly, table, column = 'col1') {
  if (!table || !table.length) return null;
  const amount = Math.round(grossMonthly);
  if (amount <= 0) return 0;
  for (const row of table) {
    if (amount >= row.from && amount <= row.to) return row[column];
  }
  return table[table.length - 1][column];
}

function getTabellNr(kommun, forsamling, churchTax) {
  if (!taxCache.kommuner || !kommun || !forsamling) return null;
  const kommunData = taxCache.kommuner[kommun];
  if (!kommunData) return null;
  const f = kommunData.find(x => x.forsamling === forsamling);
  if (!f) return null;
  const rate = churchTax ? f.inkl : f.exkl;
  return Math.round(rate);
}

let kommunerLoaded = false;
let kommunerLoading = false;

async function ensureKommunerLoaded() {
  if (kommunerLoaded || kommunerLoading) return;
  kommunerLoading = true;
  try {
    await loadKommuner();
    kommunerLoaded = true;
    renderAll();
  } catch (e) { console.error('Failed to load kommuner', e); }
  kommunerLoading = false;
}

async function ensureTabellLoaded(tabellNr) {
  if (!tabellNr || taxCache.tabeller[tabellNr]) return;
  try {
    await loadSkattetabell(tabellNr);
    renderAll();
  } catch (e) { console.error('Failed to load tabell ' + tabellNr, e); }
}

function defaultState() {
  return {
    children: [],
    parents: [
      { name: 'Parent 1', salary: 45000, topups: [], kommun: '', forsamling: '', churchTax: false },
      { name: 'Parent 2', salary: 40000, topups: [], kommun: '', forsamling: '', churchTax: false },
    ],
    rules: [],
    yearlyPlans: [],
  };
}

let state = defaultState();

function saveState() {
  try {
    const json = JSON.stringify(state);
    const compressed = LZString.compressToEncodedURIComponent(json);
    history.replaceState(null, '', '#' + compressed);
  } catch (e) { console.error('Save failed', e); }
}

function loadState() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  try {
    const json = LZString.decompressFromEncodedURIComponent(hash);
    if (json) {
      const loaded = JSON.parse(json);
      state = { ...defaultState(), ...loaded };
      state.parents = (state.parents || defaultState().parents).map(p => ({
        kommun: '', forsamling: '', churchTax: false, topups: [], ...p,
      }));
      state.children = (state.children || []).map(c => ({
        ...c,
        preschoolDate: c.preschoolDate || '',
        usedDays: c.usedDays || [{ sjuk: 0, lagsta: 0 }, { sjuk: 0, lagsta: 0 }],
      }));
      state.rules = state.rules || [];
      state.yearlyPlans = state.yearlyPlans || [];
    }
  } catch (e) { console.error('Load failed', e); }
}

function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }

function monthName(m) {
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m - 1];
}

function formatKr(n) {
  return Math.round(n).toLocaleString('sv-SE');
}

function parseDate(s) {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function dateToMonthKey(d) {
  return d.getFullYear() * 100 + (d.getMonth() + 1);
}

function addMonths(dateStr, months) {
  const d = parseDate(dateStr);
  if (!d) return null;
  d.setMonth(d.getMonth() + months);
  return d;
}

function calcDailyRate(monthlySalary) {
  const sgi = Math.min(monthlySalary * 12, FK.MAX_SGI);
  const rate = sgi * 0.97 * 0.80 / 365;
  return Math.max(FK.MIN_SJUK_DAILY, Math.min(rate, FK.MAX_SJUK_DAILY));
}

function getSharedPoolRemaining(childId, consumed) {
  const c = consumed[childId];
  const sjukUsed = [c[0].sjuk, c[1].sjuk];
  const lagstaUsed = [c[0].lagsta, c[1].lagsta];
  const totalSjukUsed = sjukUsed[0] + sjukUsed[1];
  const totalLagstaUsed = lagstaUsed[0] + lagstaUsed[1];
  const maxPerParent = FK.SJUK_DAYS_TOTAL - FK.RESERVED_SJUK;
  return [0, 1].map(pi => ({
    sjuk: Math.max(0, Math.min(maxPerParent - sjukUsed[pi], FK.SJUK_DAYS_TOTAL - totalSjukUsed)),
    lagsta: Math.max(0, FK.LAGSTA_DAYS_TOTAL - totalLagstaUsed),
  }));
}

function calculateTimeline() {
  if (!state.children.length) return { months: [], consumed: {}, warnings: [] };

  let minDate = null, maxDate = null;
  for (const c of state.children) {
    if (c.birthDate) {
      const d = parseDate(c.birthDate);
      if (!minDate || d < minDate) minDate = new Date(d);
    }
  }
  for (const r of state.rules) {
    if (r.start) {
      const d = parseDate(r.start);
      if (!minDate || d < minDate) minDate = new Date(d);
    }
    if (r.end) {
      const d = parseDate(r.end);
      if (!maxDate || d > maxDate) maxDate = new Date(d);
    }
  }
  if (!minDate) return { months: [], consumed: {}, warnings: [] };
  if (!maxDate) {
    maxDate = new Date(minDate);
    maxDate.setFullYear(maxDate.getFullYear() + 2);
  }

  const months = [];
  let y = minDate.getFullYear(), m = minDate.getMonth() + 1;
  const ey = maxDate.getFullYear(), em = maxDate.getMonth() + 1;
  while (y < ey || (y === ey && m <= em)) {
    months.push({ year: y, month: m });
    m++;
    if (m > 12) { m = 1; y++; }
  }

  const consumed = {};
  for (const c of state.children) {
    const ud = c.usedDays || [{ sjuk: 0, lagsta: 0 }, { sjuk: 0, lagsta: 0 }];
    consumed[c.id] = [
      { sjuk: ud[0].sjuk || 0, lagsta: ud[0].lagsta || 0 },
      { sjuk: ud[1].sjuk || 0, lagsta: ud[1].lagsta || 0 },
    ];
  }

  const topupMonths = [{}, {}];

  const monthResults = months.map(({ year, month }) => {
    const mStart = new Date(year, month - 1, 1);
    const mEnd = new Date(year, month, 0);
    const mDays = daysInMonth(year, month);

    const parentResults = [0, 1].map(pi => {
      let totalLeaveDays = 0;
      let totalLeaveIncome = 0;
      const leaveByChild = {};

      const childIds = new Set(state.children.map(c => c.id));
      const applicableRules = state.rules.filter(r =>
        r.pi === pi && r.start && r.end && r.ci && childIds.has(r.ci)
      );

      const daysByChild = {};
      for (const rule of applicableRules) {
        const rStart = parseDate(rule.start);
        const rEnd = parseDate(rule.end);
        if (!rStart || !rEnd) continue;

        const overlapStart = new Date(Math.max(mStart, rStart));
        const overlapEnd = new Date(Math.min(mEnd, rEnd));
        if (overlapStart > overlapEnd) continue;

        const overlapDays = Math.round((overlapEnd - overlapStart) / 86400000) + 1;
        const leaveDays = overlapDays / 7 * rule.dpw;

        if (!daysByChild[rule.ci]) daysByChild[rule.ci] = 0;
        daysByChild[rule.ci] += leaveDays;
        if (!topupMonths[pi][rule.ci]) topupMonths[pi][rule.ci] = 0;
      }

      const sjukRate = calcDailyRate(state.parents[pi].salary);
      for (const ci in daysByChild) {
        const daysNeeded = daysByChild[ci];
        const pool = getSharedPoolRemaining(ci, consumed);
        const sjukRemaining = pool[pi].sjuk;
        const lagstaRemaining = pool[pi].lagsta;
        const totalChildSjuk = consumed[ci][0].sjuk + consumed[ci][1].sjuk;
        const lagstaUnlocked = totalChildSjuk >= FK.FIRST_SJUK_REQUIREMENT;

        const sjukDays = Math.min(daysNeeded, sjukRemaining);
        const lagstaDays = lagstaUnlocked
          ? Math.min(daysNeeded - sjukDays, lagstaRemaining)
          : 0;
        const totalDays = sjukDays + lagstaDays;

        totalLeaveDays += totalDays;
        totalLeaveIncome += sjukDays * sjukRate + lagstaDays * FK.LAGSTA_DAILY;

        if (!leaveByChild[ci]) leaveByChild[ci] = { sjuk: 0, lagsta: 0 };
        leaveByChild[ci].sjuk += sjukDays;
        leaveByChild[ci].lagsta += lagstaDays;

        consumed[ci][pi].sjuk += sjukDays;
        consumed[ci][pi].lagsta += lagstaDays;
      }

      for (const ci in leaveByChild) {
        if (leaveByChild[ci].sjuk > 0 || leaveByChild[ci].lagsta > 0) {
          if (!topupMonths[pi][ci]) topupMonths[pi][ci] = 0;
          topupMonths[pi][ci]++;
        }
      }

      const avgDpw = mDays > 0 ? totalLeaveDays / (mDays / 7) : 0;
      const salary = state.parents[pi].salary;

      let fullyOffWork = false;
      const monthMid = new Date(year, month - 1, 15);
      for (const ci in leaveByChild) {
        const child = state.children.find(ch => ch.id === ci);
        if (child && child.birthDate) {
          const firstBday = addMonths(child.birthDate, 12);
          if (firstBday && monthMid < firstBday) {
            fullyOffWork = true;
            break;
          }
        }
      }

      const workFraction = fullyOffWork ? 0 : Math.max(0, (5 - Math.min(avgDpw, 5)) / 5);
      const workIncome = workFraction * salary;

      const leaveFrac = fullyOffWork ? 1 : Math.min(avgDpw, 5) / 5;
      let topupIncome = 0;
      for (const tu of state.parents[pi].topups) {
        if (leaveByChild[tu.ci] && topupMonths[pi][tu.ci] <= tu.months) {
          topupIncome += salary * (tu.pct / 100) * leaveFrac;
        }
      }

      const grossIncome = totalLeaveIncome + workIncome + topupIncome;

      const tabellNr = getTabellNr(state.parents[pi].kommun, state.parents[pi].forsamling, state.parents[pi].churchTax);
      const table = tabellNr ? taxCache.tabeller[tabellNr] : null;

      let netIncome = null;
      if (table) {
        const workGross = workIncome + topupIncome;
        const taxOnWork = workGross > 0 ? (lookupTax(workGross, table, 'col1') || 0) : 0;
        const taxOnFK = totalLeaveIncome > 0 ? (lookupTax(totalLeaveIncome, table, 'col1') || 0) : 0;
        netIncome = grossIncome - taxOnWork - taxOnFK;
      }

      return {
        leaveDays: totalLeaveDays,
        leaveIncome: totalLeaveIncome,
        workIncome,
        topupIncome,
        totalIncome: grossIncome,
        netIncome,
        avgDpw,
        leaveByChild,
      };
    });

    return { year, month, parents: parentResults };
  });

  const warnings = generateWarnings(consumed, monthResults);

  return { months: monthResults, consumed, warnings };
}

function generateWarnings(consumed, monthResults) {
  const warnings = [];

  for (const child of state.children) {
    const c0 = consumed[child.id][0], c1 = consumed[child.id][1];
    const totalSjukUsed = c0.sjuk + c1.sjuk;
    const totalLagstaUsed = c0.lagsta + c1.lagsta;

    if (totalSjukUsed > FK.SJUK_DAYS_TOTAL) {
      warnings.push({ type: 'error', msg: `${child.name}: ${Math.round(totalSjukUsed)} sjukpenning days used, but only ${FK.SJUK_DAYS_TOTAL} available.` });
    }
    if (totalLagstaUsed > FK.LAGSTA_DAYS_TOTAL) {
      warnings.push({ type: 'error', msg: `${child.name}: ${Math.round(totalLagstaUsed)} lägsta days used, but only ${FK.LAGSTA_DAYS_TOTAL} available.` });
    }
    for (let pi = 0; pi < 2; pi++) {
      const used = consumed[child.id][pi].sjuk;
      if (used < FK.RESERVED_SJUK && (totalSjukUsed + totalLagstaUsed) >= FK.SJUK_DAYS_TOTAL + FK.LAGSTA_DAYS_TOTAL - 1) {
        warnings.push({ type: 'warn', msg: `${state.parents[pi].name} has only used ${Math.round(used)} sjukpenning days for ${child.name}. ${FK.RESERVED_SJUK} reserved days must be used by this parent.` });
      }
    }

    if (child.birthDate) {
      const bd = parseDate(child.birthDate);
      const fourthBirthday = new Date(bd);
      fourthBirthday.setFullYear(fourthBirthday.getFullYear() + 4);

      const totalAvail = FK.SJUK_DAYS_TOTAL + FK.LAGSTA_DAYS_TOTAL;
      const totalUsed = totalSjukUsed + totalLagstaUsed;
      const remaining = totalAvail - totalUsed;

      if (remaining > FK.SAVE_LIMIT_4YR) {
        const mustUseBy4 = remaining - FK.SAVE_LIMIT_4YR;
        const fourthStr = fourthBirthday.toISOString().slice(0, 10);
        warnings.push({ type: 'warn', msg: `${child.name}: ${Math.round(remaining)} days remain. After ${fourthStr} (4th birthday), only ${FK.SAVE_LIMIT_4YR} can be saved. Use ${Math.round(mustUseBy4)} more days before then.` });
      }
    }
  }

  for (const mr of monthResults) {
    for (let pi = 0; pi < 2; pi++) {
      const pr = mr.parents[pi];
      for (const ci in pr.leaveByChild) {
        const child = state.children.find(c => c.id === ci);
        if (!child || !child.birthDate) continue;
        const bd = parseDate(child.birthDate);
        const firstBirthday = new Date(bd);
        firstBirthday.setFullYear(firstBirthday.getFullYear() + 1);
        const monthDate = new Date(mr.year, mr.month - 1, 15);

        if (monthDate >= firstBirthday && pr.avgDpw > 0 && pr.avgDpw < 5) {
          warnings.push({
            type: 'info',
            msg: `${state.parents[pi].name} is taking ${pr.avgDpw.toFixed(1)} days/week in ${monthName(mr.month)} ${mr.year} (${child.name} is over 1). Taking fewer than 5 days/week after the child's first birthday may affect SGI protection.`,
          });
          break;
        }
      }
    }
  }

  const seen = new Set();
  return warnings.filter(w => {
    if (seen.has(w.msg)) return false;
    seen.add(w.msg);
    return true;
  });
}

// --- RENDERING ---

const COLLAPSED_STORAGE_KEY = 'parplan_collapsedSections';

const collapsedSections = (function () {
  const set = new Set();
  try {
    const raw = localStorage.getItem(COLLAPSED_STORAGE_KEY);
    if (raw) {
      const arr = JSON.parse(raw);
      if (Array.isArray(arr)) arr.forEach(id => set.add(id));
    }
  } catch (_) {}
  return set;
})();

function saveCollapsedState() {
  try {
    localStorage.setItem(COLLAPSED_STORAGE_KEY, JSON.stringify([...collapsedSections]));
  } catch (_) {}
}

function collapsible(id, title, summary, content) {
  const isOpen = !collapsedSections.has(id);
  return `
    <details class="collapsible-section bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden" data-collapsible-id="${esc(id)}" ${isOpen ? 'open' : ''}>
      <summary class="flex items-center justify-between gap-2 px-4 py-3 cursor-pointer list-none select-none hover:bg-slate-50 border-b border-slate-100">
        <span class="font-semibold text-slate-900">${esc(title)}</span>
        <span class="text-sm text-slate-500 truncate flex-1 text-right mx-2">${esc(summary)}</span>
        <span class="collapsible-chevron text-slate-400 text-xs flex-shrink-0">&#9660;</span>
      </summary>
      <div class="p-4 pt-3 border-t-0">${content}</div>
    </details>
  `;
}

document.addEventListener('toggle', function (e) {
  if (e.target.classList && e.target.classList.contains('collapsible-section')) {
    const id = e.target.getAttribute('data-collapsible-id');
    if (id) {
      if (e.target.open) collapsedSections.delete(id);
      else collapsedSections.add(id);
      saveCollapsedState();
    }
  }
}, true);

function summaryChildren() {
  if (!state.children.length) return 'No children';
  return state.children.map(c => {
    const d = c.birthDate ? c.birthDate.slice(0, 7) : '?';
    return `${esc(c.name)} (${d})`;
  }).join(', ');
}

function summaryParents() {
  return state.parents.map(p => `${esc(p.name)}: ${(p.salary / 1000).toFixed(0)}k`).join(', ');
}

function summaryDayPool() {
  if (!state.children.length) return 'No children';
  return state.children.map(c => {
    const u = c.usedDays || [{ sjuk: 0, lagsta: 0 }, { sjuk: 0, lagsta: 0 }];
    const total = (u[0].sjuk || 0) + (u[0].lagsta || 0) + (u[1].sjuk || 0) + (u[1].lagsta || 0);
    return `${esc(c.name)}: ${total} used`;
  }).join(', ');
}

function summaryRules() {
  if (!state.rules.length) return 'No rules';
  const starts = state.rules.map(r => r.start).filter(Boolean).sort();
  const ends = state.rules.map(r => r.end).filter(Boolean).sort((a, b) => b.localeCompare(a));
  const range = starts.length && ends.length ? `${starts[0].slice(0, 7)} – ${ends[0].slice(0, 7)}` : '';
  return `${state.rules.length} rules${range ? ', ' + range : ''}`;
}

function summaryYearlyPlans() {
  if (!state.yearlyPlans || !state.yearlyPlans.length) return 'None';
  return `${state.yearlyPlans.length} plan(s)`;
}

function summaryWarnings(warnings) {
  if (!warnings || !warnings.length) return '0 warnings';
  const counts = { error: 0, warn: 0, info: 0 };
  warnings.forEach(w => { counts[w.type] = (counts[w.type] || 0) + 1; });
  const parts = [];
  if (counts.error) parts.push(`${counts.error} error(s)`);
  if (counts.warn) parts.push(`${counts.warn} warning(s)`);
  if (counts.info) parts.push(`${counts.info} info`);
  return parts.join(', ');
}

function summaryDayBalance(consumed) {
  if (!state.children.length) return '—';
  let totalUsed = 0, totalPool = 0;
  for (const c of state.children) {
    const cons = consumed[c.id] || [{ sjuk: 0, lagsta: 0 }, { sjuk: 0, lagsta: 0 }];
    const used = cons[0].sjuk + cons[0].lagsta + cons[1].sjuk + cons[1].lagsta;
    totalUsed += used;
    totalPool += FK.SJUK_DAYS_TOTAL + FK.LAGSTA_DAYS_TOTAL;
  }
  return `${Math.round(totalUsed)}/${totalPool} used`;
}

function summaryRemainingDays(consumed) {
  const children = state.children.filter(c => c.birthDate);
  if (!children.length) return '—';
  let totalRem = 0;
  for (const c of children) {
    const cons = consumed[c.id] || [{ sjuk: 0, lagsta: 0 }, { sjuk: 0, lagsta: 0 }];
    const sjukUsed = cons[0].sjuk + cons[1].sjuk;
    const lagstaUsed = cons[0].lagsta + cons[1].lagsta;
    totalRem += Math.max(0, FK.SJUK_DAYS_TOTAL - sjukUsed) + Math.max(0, FK.LAGSTA_DAYS_TOTAL - lagstaUsed);
  }
  if (totalRem <= 0) return '0 days';
  const years = (totalRem / 480).toFixed(1);
  return `${Math.round(totalRem)} days, ${years} years`;
}

function summaryMonthlyOverview(months) {
  if (!months || !months.length) return '—';
  const first = months[0], last = months[months.length - 1];
  const a = first ? `${monthName(first.month)} ${first.year}` : '';
  const b = last ? `${monthName(last.month)} ${last.year}` : '';
  return `${months.length} months${a && b ? ', ' + a + ' – ' + b : ''}`;
}

              </div>
              <div class="mb-2">
                <div class="flex justify-between text-xs text-slate-600 mb-1">
                  <span>Lägstanivå (${FK.LAGSTA_DAYS_TOTAL} total, shared)</span>
                  <span>${Math.round(totalLagsta)} / ${FK.LAGSTA_DAYS_TOTAL} used (${Math.round(FK.LAGSTA_DAYS_TOTAL - totalLagsta)} left)</span>
                </div>
                <div class="h-3 bg-slate-200 rounded-full overflow-hidden flex">
                  <div class="bar h-full" style="width:${cons[0].lagsta / FK.LAGSTA_DAYS_TOTAL * 100}%;background:#60a5fa" title="${esc(state.parents[0].name)}: ${Math.round(cons[0].lagsta)}"></div>
                  <div class="bar h-full" style="width:${cons[1].lagsta / FK.LAGSTA_DAYS_TOTAL * 100}%;background:#f472b6" title="${esc(state.parents[1].name)}: ${Math.round(cons[1].lagsta)}"></div>
                </div>
                <div class="flex justify-between text-xs mt-0.5">
                  <span style="color:#60a5fa">${esc(state.parents[0].name)}: ${Math.round(cons[0].lagsta)}</span>
                  <span style="color:#f472b6">${esc(state.parents[1].name)}: ${Math.round(cons[1].lagsta)}</span>
                </div>
              </div>
              <div class="text-xs text-slate-500 text-center">
                Total: ${Math.round(totalUsed)} / ${totalPool} days used
              </div>
              ${transferNote ? '<div class="mt-1.5 text-xs text-slate-500 text-center italic">' + transferNote + '</div>' : ''}
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function renderRemainingDays(consumed) {
  const children = state.children.filter(c => c.birthDate);
  if (!children.length) return '';

  const now = new Date();
  const avgSjukRate = (calcDailyRate(state.parents[0].salary) + calcDailyRate(state.parents[1].salary)) / 2;

  const pools = [];
  let totalRemSjuk = 0, totalRemLagsta = 0;

  for (const c of children) {
    const cons = consumed[c.id] || [{ sjuk: 0, lagsta: 0 }, { sjuk: 0, lagsta: 0 }];
    const sjukUsed = cons[0].sjuk + cons[1].sjuk;
    const lagstaUsed = cons[0].lagsta + cons[1].lagsta;
    const remSjuk = Math.max(0, FK.SJUK_DAYS_TOTAL - sjukUsed);
    const remLagsta = Math.max(0, FK.LAGSTA_DAYS_TOTAL - lagstaUsed);
    const remTotal = remSjuk + remLagsta;
    totalRemSjuk += remSjuk;
    totalRemLagsta += remLagsta;
    if (remTotal <= 0) continue;

    const bd = parseDate(c.birthDate);
    const age4 = new Date(bd); age4.setFullYear(age4.getFullYear() + 4);
    const age12 = new Date(bd); age12.setFullYear(age12.getFullYear() + 12);

    const mustBefore4 = Math.max(0, remTotal - FK.SAVE_LIMIT_4YR);
    const saveableAfter4 = Math.min(remTotal, FK.SAVE_LIMIT_4YR);

    if (mustBefore4 > 0) {
      pools.push({ child: c.name, days: mustBefore4, deadline: age4, label: 'before age 4', windowStart: null });
    }
    if (saveableAfter4 > 0) {
      pools.push({ child: c.name, days: saveableAfter4, deadline: age12, label: 'before age 12', windowStart: age4 });
    }
  }

  const totalRem = totalRemSjuk + totalRemLagsta;
  if (totalRem <= 0) return '';

  pools.sort((a, b) => a.deadline - b.deadline);

  let planStart = now;
  for (const r of state.rules) {
    if (r.end) {
      const d = parseDate(r.end);
      if (d && d > planStart) planStart = d;
    }
  }

  const latestDeadline = pools.length ? pools[pools.length - 1].deadline : planStart;
  const plannedYears = (state.yearlyPlans || []).map(yp => yp.year).filter(y => y && Number.isFinite(y));
  const firstYear = Math.min(planStart.getFullYear(), ...plannedYears, latestDeadline.getFullYear());
  const lastYear = Math.max(latestDeadline.getFullYear(), ...plannedYears, planStart.getFullYear());

  const dayMs = 86400000;
  function daysInSegment(segStart, segEnd) {
    return Math.max(0, Math.round((segEnd - segStart) / dayMs) + 1);
  }
  function roundPreservingSum(amounts) {
    const target = Math.round(amounts.reduce((a, b) => a + b, 0));
    const fl = amounts.map(a => Math.floor(a));
    let sum = fl.reduce((a, b) => a + b, 0);
    let remainder = target - sum;
    const indices = amounts.map((_, i) => i).sort((a, b) => (amounts[b] - fl[b]) - (amounts[a] - fl[a]));
    for (let i = 0; i < remainder; i++) fl[indices[i]] += 1;
    return fl;
  }

  const monthSlots = [];
  for (let y = firstYear; y <= lastYear; y++) {
    const startMonth = (y === firstYear) ? planStart.getMonth() : 0;
    for (let m = startMonth; m <= 11; m++) {
      const monthStart = new Date(y, m, 1);
      const monthEnd = new Date(y, m + 1, 0);
      monthSlots.push({ year: y, month: m, monthStart, monthEnd, days: 0, sources: [], fixed: false });
    }
  }

  const plansByYear = {};
  let allPlannedTotal = 0;
  for (const yp of (state.yearlyPlans || [])) {
    if (!yp.ci || !yp.days || !yp.year) continue;
    const child = state.children.find(c => c.id === yp.ci);
    if (!child) continue;
    if (!plansByYear[yp.year]) plansByYear[yp.year] = [];
    plansByYear[yp.year].push({ child: child.name, days: yp.days });
    allPlannedTotal += yp.days;
  }

  for (let i = 0; i < monthSlots.length; i++) {
    const slot = monthSlots[i];
    const isFirstMonthOfYear = (i === 0) || (monthSlots[i - 1].year !== slot.year);
    if (!isFirstMonthOfYear) continue;
    const plans = plansByYear[slot.year];
    if (plans) {
      for (const p of plans) {
        slot.days += p.days;
        slot.sources.push({ child: p.child, days: p.days, label: 'planned' });
      }
    }
  }
  for (const slot of monthSlots) {
    if (plansByYear[slot.year]) slot.fixed = true;
  }

  let plannedLeft = allPlannedTotal;
  for (const pool of pools) {
    if (plannedLeft <= 0) break;
    const deduct = Math.min(pool.days, plannedLeft);
    pool.days -= deduct;
    plannedLeft -= deduct;
  }

  const latestBefore4Deadline = pools
    .filter(p => p.label === 'before age 4')
    .reduce((max, p) => (p.deadline > max ? p.deadline : max), new Date(0));

  for (const pool of pools) {
    const poolStart = pool.windowStart != null ? pool.windowStart : planStart;
    const poolEnd = pool.deadline;
    const eligible = monthSlots.filter(slot => {
      if (slot.fixed) return false;
      if (pool.label === 'before age 12' && slot.monthStart <= latestBefore4Deadline) return false;
      const segStart = slot.monthStart > poolStart ? slot.monthStart : poolStart;
      const segEnd = slot.monthEnd < poolEnd ? slot.monthEnd : poolEnd;
      return segEnd >= segStart;
    }).map(slot => {
      const segStart = slot.monthStart > poolStart ? slot.monthStart : poolStart;
      const segEnd = slot.monthEnd < poolEnd ? slot.monthEnd : poolEnd;
      const segmentDays = daysInSegment(segStart, segEnd);
      return { slot, segmentDays };
    }).filter(x => x.segmentDays > 0);

    if (!eligible.length) continue;
    const totalWeight = eligible.reduce((s, x) => s + x.segmentDays, 0);
    if (totalWeight <= 0) continue;

    const fullYears = [];
    for (let y = firstYear; y <= lastYear; y++) {
      const yStart = new Date(y, 0, 1);
      const yEnd = new Date(y, 11, 31);
      if (poolStart <= yStart && poolEnd >= yEnd) fullYears.push(y);
    }
    const fullSlots = eligible.filter(x => fullYears.includes(x.slot.year));
    const partialSlots = eligible.filter(x => !fullYears.includes(x.slot.year));
    const fullWeight = fullSlots.reduce((s, x) => s + x.segmentDays, 0);
    const partialWeight = partialSlots.reduce((s, x) => s + x.segmentDays, 0);

    let fullYearTotal = 0;
    let partialTotal = pool.days;
    if (fullYears.length > 0 && totalWeight > 0) {
      fullYearTotal = Math.round(pool.days * fullWeight / totalWeight);
      partialTotal = pool.days - fullYearTotal;
    }

    if (fullYears.length > 0 && fullYearTotal > 0) {
      const currentTotalsByYear = {};
      for (const slot of monthSlots) {
        currentTotalsByYear[slot.year] = (currentTotalsByYear[slot.year] || 0) + slot.days;
      }
      const sumCurrent = fullYears.reduce((s, y) => s + (currentTotalsByYear[y] || 0), 0);
      const targetPerYear = (fullYearTotal + sumCurrent) / fullYears.length;
      let perYearAmounts = fullYears.map(y => Math.max(0, targetPerYear - (currentTotalsByYear[y] || 0)));
      const sumTarget = perYearAmounts.reduce((a, b) => a + b, 0);
      if (sumTarget <= 0) perYearAmounts = fullYears.map(() => fullYearTotal / fullYears.length);
      else if (Math.abs(sumTarget - fullYearTotal) > 0.5) perYearAmounts = perYearAmounts.map(a => a * fullYearTotal / sumTarget);
      const perYearRounded = roundPreservingSum(perYearAmounts);
      for (let i = 0; i < fullYears.length; i++) {
        const y = fullYears[i];
        const yearTotal = Math.max(0, Math.min(perYearRounded[i], fullYearTotal));
        const monthsInYear = fullSlots.filter(x => x.slot.year === y);
        if (monthsInYear.length === 0) continue;
        const perMonth = monthsInYear.map(() => yearTotal / monthsInYear.length);
        const perMonthRounded = roundPreservingSum(perMonth);
        for (let j = 0; j < monthsInYear.length; j++) {
          const give = perMonthRounded[j];
          if (give > 0) {
            monthsInYear[j].slot.days += give;
            monthsInYear[j].slot.sources.push({ child: pool.child, days: give, label: pool.label });
          }
        }
      }
    }

    if (partialSlots.length > 0 && partialTotal > 0 && partialWeight > 0) {
      const amounts = partialSlots.map(x => partialTotal * x.segmentDays / partialWeight);
      const rounded = roundPreservingSum(amounts);
      for (let i = 0; i < partialSlots.length; i++) {
        const give = rounded[i];
        if (give > 0) {
          partialSlots[i].slot.days += give;
          partialSlots[i].slot.sources.push({ child: pool.child, days: give, label: pool.label });
        }
      }
    }
  }

  const yearSlots = [];
  for (let y = firstYear; y <= lastYear; y++) {
    const monthsInYear = monthSlots.filter(s => s.year === y);
    const total = monthsInYear.reduce((s, m) => s + m.days, 0);
    const sources = monthsInYear.flatMap(m => m.sources);
    const fixed = monthsInYear.some(m => m.fixed);
    yearSlots.push({ year: y, sjuk: 0, lagsta: 0, total, sources, fixed });
  }

  let globalSjukLeft = totalRemSjuk;
  for (const slot of yearSlots) {
    const sjukForSlot = Math.min(globalSjukLeft, slot.total);
    slot.sjuk = sjukForSlot;
    slot.lagsta = slot.total - sjukForSlot;
    globalSjukLeft -= sjukForSlot;
  }

  const totalValue = Math.round(totalRemSjuk * avgSjukRate + totalRemLagsta * FK.LAGSTA_DAILY);
  const maxDays = Math.max(...yearSlots.map(s => s.total), 1);

  return `
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
      <h2 class="text-lg font-semibold text-slate-900 mb-1">Remaining Days</h2>
      <p class="text-xs text-slate-400 mb-4">Joint pool across all children. Days balanced evenly over time (by month), respecting age 4 and age 12 deadlines. Results shown by year.</p>

      <div class="flex flex-wrap gap-3 mb-4">
        <div class="flex-1 min-w-[100px] p-3 bg-blue-50 rounded-lg text-center">
          <div class="text-2xl font-bold text-blue-700">${Math.round(totalRem)}</div>
          <div class="text-xs text-slate-500">total days</div>
        </div>
        <div class="flex-1 min-w-[100px] p-3 bg-blue-50 rounded-lg text-center">
          <div class="text-lg font-bold text-blue-600">${Math.round(totalRemSjuk)}</div>
          <div class="text-xs text-slate-500">sjukpenning</div>
        </div>
        <div class="flex-1 min-w-[100px] p-3 bg-orange-50 rounded-lg text-center">
          <div class="text-lg font-bold text-orange-600">${Math.round(totalRemLagsta)}</div>
          <div class="text-xs text-slate-500">lägstanivå</div>
        </div>
        <div class="flex-1 min-w-[100px] p-3 bg-emerald-50 rounded-lg text-center">
          <div class="text-lg font-bold text-emerald-700">${formatKr(totalValue)}</div>
          <div class="text-xs text-slate-500">est. value (kr)</div>
        </div>
      </div>

      ${pools.some(p => p.label === 'before age 4') ? `
        <div class="mb-4 p-2.5 bg-amber-50 rounded-lg border border-amber-200 text-xs">
          <span class="font-medium text-amber-800">Age 4 deadlines: </span>
          <span class="text-amber-700">${pools.filter(p => p.label === 'before age 4').map(p =>
            esc(p.child) + ': ' + Math.round(p.days) + ' days by ' + p.deadline.toISOString().slice(0, 10)
          ).join(' · ')}</span>
        </div>
      ` : ''}

      <h3 class="text-sm font-semibold text-slate-700 mb-2">Suggested yearly plan</h3>
      <div class="space-y-1.5">
        ${yearSlots.filter(s => s.total > 0).map(s => {
          const weeks = (s.total / 5).toFixed(1);
          const byChildLabel = {};
          for (const src of s.sources) {
            const key = src.child + '|' + src.label;
            if (!byChildLabel[key]) byChildLabel[key] = { child: src.child, label: src.label, days: 0 };
            byChildLabel[key].days += src.days;
          }
          const sourceNote = Object.keys(byChildLabel).length > 0
            ? Object.values(byChildLabel).map(o => esc(o.child) + ' ' + o.label + ': ' + Math.round(o.days)).join(', ')
            : '';
          return `
            <div class="rounded-lg hover:bg-slate-50 cursor-pointer ${s.fixed ? 'ring-1 ring-violet-300 bg-violet-50/50' : ''}" onclick="this.querySelector('.yr-detail').classList.toggle('hidden')">
              <div class="flex items-center gap-2 py-1.5 px-2">
                <span class="w-10 text-sm font-medium flex-shrink-0 ${s.fixed ? 'text-violet-700' : 'text-slate-700'}">${s.year}</span>
                <div class="flex-1 h-3 bg-slate-100 rounded-full overflow-hidden flex">
                  <div class="bar h-full rounded-full" style="width:${s.sjuk / maxDays * 100}%;background:#2563eb"></div>
                  <div class="bar h-full rounded-full" style="width:${s.lagsta / maxDays * 100}%;background:#f59e0b"></div>
                </div>
                <span class="w-20 text-sm font-bold text-right flex-shrink-0">${Math.round(s.total)} days</span>
                <span class="w-20 text-xs text-slate-500 text-right flex-shrink-0">${weeks} weeks</span>
                <span class="w-4 text-xs text-slate-300 flex-shrink-0">&#9654;</span>
              </div>
              <div class="yr-detail hidden px-2 pb-2 pt-0.5 ml-10">
                <div class="text-xs text-slate-500 pl-2 border-l-2 border-slate-200 space-y-0.5">
                  ${s.sjuk > 0 ? '<div><span class="inline-block w-2 h-2 rounded-full bg-blue-600 mr-1"></span>' + Math.round(s.sjuk) + ' sjukpenning days (' + formatKr(Math.round(s.sjuk * avgSjukRate)) + ' kr)</div>' : ''}
                  ${s.lagsta > 0 ? '<div><span class="inline-block w-2 h-2 rounded-full bg-amber-500 mr-1"></span>' + Math.round(s.lagsta) + ' lägstanivå days (' + formatKr(Math.round(s.lagsta * FK.LAGSTA_DAILY)) + ' kr)</div>' : ''}
                  ${sourceNote ? '<div class="text-slate-400 mt-0.5">From: ' + sourceNote + '</div>' : ''}
                </div>
              </div>
            </div>`;
        }).join('')}
      </div>
      <div class="flex items-center gap-4 mt-3 text-xs text-slate-400 justify-center">
        <span><span class="inline-block w-2 h-2 rounded-full bg-blue-600 mr-1"></span>Sjukpenning</span>
        <span><span class="inline-block w-2 h-2 rounded-full bg-amber-500 mr-1"></span>Lägstanivå</span>
      </div>
    </div>
  `;
}

function renderTimeline(months) {
  const p0Name = state.parents[0].name;
  const p1Name = state.parents[1].name;
  const fullSalary = state.parents[0].salary + state.parents[1].salary;
  const barBaseGross = Math.max(fullSalary, ...months.map(m => m.parents[0].totalIncome + m.parents[1].totalIncome), 1);
  const anyNet = months.some(m => m.parents[0].netIncome !== null && m.parents[1].netIncome !== null);
  let fullNetSalary = null;
  if (anyNet) {
    fullNetSalary = [0, 1].reduce((sum, pi) => {
      const tn = getTabellNr(state.parents[pi].kommun, state.parents[pi].forsamling, state.parents[pi].churchTax);
      const tbl = tn ? taxCache.tabeller[tn] : null;
      const tax = tbl ? (lookupTax(state.parents[pi].salary, tbl, 'col1') || 0) : 0;
      return sum + state.parents[pi].salary - tax;
    }, 0);
  }
  const barBase = anyNet && fullNetSalary
    ? Math.max(fullNetSalary, ...months.map(m => (m.parents[0].netIncome || 0) + (m.parents[1].netIncome || 0)), 1)
    : barBaseGross;

  return `
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
      <h2 class="text-lg font-semibold text-slate-900 mb-4">Monthly Overview</h2>
      <div class="flex items-center gap-2 py-1 px-2 mb-1 text-xs text-slate-400">
        <span class="flex-shrink-0" style="width:5.5rem"></span>
        <span class="flex-1"></span>
        <span class="w-16 text-right flex-shrink-0" style="color:#2563eb">${esc(p0Name)}</span>
        <span class="w-16 text-right flex-shrink-0" style="color:#be185d">${esc(p1Name)}</span>
        <span class="w-16 text-right flex-shrink-0 font-medium">${anyNet ? 'Net' : 'Total'}</span>
        <span class="w-10 text-right flex-shrink-0">%</span>
        <span class="w-4"></span>
      </div>
      <div class="space-y-0.5">
        ${months.map((m, mi) => {
          const p0 = m.parents[0], p1 = m.parents[1];
          const familyTotal = p0.totalIncome + p1.totalIncome;
          const hasNet = p0.netIncome !== null && p1.netIncome !== null;
          const familyNet = hasNet ? p0.netIncome + p1.netIncome : null;
          const isActive = p0.leaveDays > 0 || p1.leaveDays > 0;
          const pctBasis = hasNet ? familyNet : familyTotal;
          const pctDenom = hasNet && fullNetSalary ? fullNetSalary : fullSalary;
          const pct = pctDenom > 0 ? Math.round(pctBasis / pctDenom * 100) : 100;
          const pctColor = pct >= 95 ? 'text-slate-400' : pct >= 75 ? 'text-amber-600' : 'text-red-600';

          function parentDetail(p, name, color) {
            if (p.leaveDays <= 0) {
              return '<span class="text-xs text-slate-400">' + esc(name) + ': working (gross ' + formatKr(p.totalIncome) + ')</span>';
            }
            const parts = [];
            parts.push(Math.round(p.leaveDays) + ' days');
            parts.push('FK ' + formatKr(p.leaveIncome));
            if (p.workIncome > 0) parts.push('Work ' + formatKr(p.workIncome));
            if (p.topupIncome > 0) parts.push('Top-up ' + formatKr(p.topupIncome));
            return '<span class="text-xs" style="color:' + color + '">' + esc(name) + '</span><span class="text-xs text-slate-600">: ' + parts.join(' · ') + ' = gross <strong>' + formatKr(p.totalIncome) + '</strong></span>';
          }

          return `
            <div class="rounded-lg ${isActive ? 'hover:bg-slate-50' : ''} ${isActive ? 'cursor-pointer' : ''}" ${isActive ? 'onclick="actions.toggleMonth(' + mi + ')"' : ''}>
              <div class="flex items-center gap-2 py-1.5 px-2">
                <span class="text-sm font-medium text-slate-700 flex-shrink-0" style="width:5.5rem">${m.year} ${monthName(m.month).slice(0,3)}</span>
                <div class="flex-1 h-3 bg-slate-100 rounded-full overflow-hidden flex">
                  ${isActive ? `
                    <div class="bar h-full" style="width:${(hasNet ? p0.netIncome : p0.totalIncome) / barBase * 100}%;background:#2563eb"></div>
                    <div class="bar h-full" style="width:${(hasNet ? p1.netIncome : p1.totalIncome) / barBase * 100}%;background:#be185d"></div>
                  ` : `
                    <div class="bar h-full" style="width:${(hasNet ? p0.netIncome : p0.totalIncome) / barBase * 100}%;background:#93c5fd"></div>
                    <div class="bar h-full" style="width:${(hasNet ? p1.netIncome : p1.totalIncome) / barBase * 100}%;background:#f9a8d4"></div>
                  `}
                </div>
                ${hasNet ? `
                  <span class="w-16 text-xs text-right flex-shrink-0" style="color:#2563eb">${formatKr(p0.netIncome)}</span>
                  <span class="w-16 text-xs text-right flex-shrink-0" style="color:#be185d">${formatKr(p1.netIncome)}</span>
                  <span class="w-16 text-sm font-bold text-right flex-shrink-0">${formatKr(familyNet)}</span>
                ` : `
                  <span class="w-16 text-xs text-right flex-shrink-0" style="color:#2563eb">${formatKr(p0.totalIncome)}</span>
                  <span class="w-16 text-xs text-right flex-shrink-0" style="color:#be185d">${formatKr(p1.totalIncome)}</span>
                  <span class="w-16 text-sm font-bold text-right flex-shrink-0">${formatKr(familyTotal)}</span>
                `}
                <span class="w-10 text-xs ${pctColor} text-right flex-shrink-0">${pct}%</span>
                ${isActive ? '<span class="w-4 text-xs text-slate-300 flex-shrink-0 tl-arrow" data-mi="' + mi + '">&#9654;</span>' : '<span class="w-4"></span>'}
              </div>
              ${isActive ? `<div class="tl-detail hidden px-2 pb-2 pt-0.5" style="margin-left:5.5rem" data-detail="${mi}">
                <div class="flex flex-col gap-0.5 pl-2 border-l-2 border-slate-200">
                  <div>${parentDetail(p0, p0Name, '#2563eb')}</div>
                  <div>${parentDetail(p1, p1Name, '#be185d')}</div>
                </div>
              </div>` : ''}
            </div>
          `;
        }).join('')}
      </div>
      ${renderLeaveSummary(months, anyNet, fullNetSalary)}
    </div>
  `;
}

function renderLeaveSummary(months, anyNet, fullNetSalary) {
  const leaveMonths = months.filter(m => m.parents[0].leaveDays > 0 || m.parents[1].leaveDays > 0);
  if (!leaveMonths.length) return '';

  const totalMonths = months.length;
  const summaries = [0, 1].map(pi => {
    const name = state.parents[pi].name;
    const salary = state.parents[pi].salary;
    let fullGross = 0, actualGross = 0, fullNet = 0, actualNet = 0;
    const hasNet = anyNet;

    for (const m of months) {
      const p = m.parents[pi];
      fullGross += salary;
      actualGross += p.totalIncome;
      if (hasNet) {
        const tn = getTabellNr(state.parents[pi].kommun, state.parents[pi].forsamling, state.parents[pi].churchTax);
        const tbl = tn ? taxCache.tabeller[tn] : null;
        const fullTax = tbl ? (lookupTax(salary, tbl, 'col1') || 0) : 0;
        fullNet += salary - fullTax;
        actualNet += p.netIncome !== null ? p.netIncome : p.totalIncome;
      }
    }

    const lostGross = fullGross - actualGross;
    const lostNet = hasNet ? fullNet - actualNet : null;
    const pctRetainedGross = fullGross > 0 ? actualGross / fullGross * 100 : 100;
    const pctRetainedNet = hasNet && fullNet > 0 ? actualNet / fullNet * 100 : null;

    return { name, salary, fullGross, actualGross, lostGross, pctRetainedGross, fullNet, actualNet, lostNet, pctRetainedNet, hasNet };
  });

  const familyLostNet = anyNet ? summaries[0].lostNet + summaries[1].lostNet : null;
  const familyLostGross = summaries[0].lostGross + summaries[1].lostGross;

  return `
    <div class="mt-4 pt-4 border-t border-slate-200">
      <h3 class="text-sm font-semibold text-slate-700 mb-3">Parental Leave Income Impact (${totalMonths} months)</h3>
      <div class="grid grid-cols-2 gap-3">
        ${summaries.map((s, pi) => {
          const color = pi === 0 ? '#2563eb' : '#be185d';
          const bg = pi === 0 ? '#eff6ff' : '#fdf2f8';
          const pct = s.hasNet ? s.pctRetainedNet : s.pctRetainedGross;
          const lost = s.hasNet ? s.lostNet : s.lostGross;
          return `
            <div class="p-3 rounded-lg text-xs space-y-1" style="background:${bg}">
              <div class="font-medium text-sm" style="color:${color}">${esc(s.name)}</div>
              <div class="text-slate-600">
                ${s.hasNet
                  ? `Full net salary: <strong>${formatKr(s.fullNet)} kr</strong> over ${totalMonths} mo`
                  : `Full gross salary: <strong>${formatKr(s.fullGross)} kr</strong> over ${totalMonths} mo`}
              </div>
              <div class="text-slate-600">
                ${s.hasNet
                  ? `Actual net income: <strong>${formatKr(s.actualNet)} kr</strong>`
                  : `Actual gross income: <strong>${formatKr(s.actualGross)} kr</strong>`}
              </div>
              <div class="font-medium" style="color:${color}">
                Lost income: <strong>${formatKr(lost)} kr</strong> (${(100 - pct).toFixed(1)}% reduction)
              </div>
              <div class="h-2 bg-slate-200 rounded-full overflow-hidden mt-1">
                <div class="bar h-full rounded-full" style="width:${pct}%;background:${color}"></div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
      <div class="text-xs text-slate-500 text-center mt-2">
        Total family lost income: <strong>${formatKr(anyNet ? familyLostNet : familyLostGross)} kr</strong> over the period
      </div>
    </div>
  `;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// --- ACTIONS ---

window.actions = {
  addChild() {
    const id = nextId();
    state.children.push({ id, name: 'Child ' + (state.children.length + 1), birthDate: '', preschoolDate: '', usedDays: [{ sjuk: 0, lagsta: 0 }, { sjuk: 0, lagsta: 0 }] });
    saveState();
    renderAll();
  },
  removeChild(id) {
    state.children = state.children.filter(c => c.id !== id);
    state.rules = state.rules.filter(r => r.ci !== id);
    for (const p of state.parents) {
      p.topups = p.topups.filter(t => t.ci !== id);
    }
    saveState();
    renderAll();
  },
  updateChild(id, field, value) {
    const c = state.children.find(c => c.id === id);
    if (c) c[field] = value;
    saveState();
    renderAll();
  },
  updateParent(pi, field, value) {
    state.parents[pi][field] = value;
    saveState();
    renderAll();
  },
  updateParentTax(pi, field, value) {
    const p = state.parents[pi];
    p[field] = value;
    if (field === 'kommun') {
      p.forsamling = '';
    }
    saveState();
    renderAll();
    const tabellNr = getTabellNr(p.kommun, p.forsamling, p.churchTax);
    if (tabellNr) ensureTabellLoaded(tabellNr);
  },
  addTopup(pi) {
    state.parents[pi].topups.push({ ci: '', pct: 10, months: 6 });
    saveState();
    renderAll();
  },
  removeTopup(pi, ti) {
    state.parents[pi].topups.splice(ti, 1);
    saveState();
    renderAll();
  },
  updateTopup(pi, ti, field, value) {
    state.parents[pi].topups[ti][field] = value;
    saveState();
    renderAll();
  },
  updateUsedDays(childId, pi, level, value) {
    const c = state.children.find(c => c.id === childId);
    if (!c) return;
    if (!c.usedDays) c.usedDays = [{ sjuk: 0, lagsta: 0 }, { sjuk: 0, lagsta: 0 }];
    c.usedDays[pi][level] = Math.max(0, Math.round(value));
    saveState();
    renderAll();
  },
  addRule() {
    const firstChild = state.children[0];
    let defaultStart = '';
    let defaultEnd = '';
    if (firstChild && firstChild.birthDate) {
      defaultStart = firstChild.birthDate;
      const end = addMonths(firstChild.birthDate, 6);
      if (end) defaultEnd = end.toISOString().slice(0, 10);
    }
    state.rules.push({
      id: nextId(),
      pi: 0,
      ci: firstChild ? firstChild.id : '',
      start: defaultStart,
      end: defaultEnd,
      dpw: 7,
    });
    saveState();
    renderAll();
  },
  removeRule(ri) {
    state.rules.splice(ri, 1);
    saveState();
    renderAll();
  },
  updateRule(ri, field, value) {
    state.rules[ri][field] = value;
    saveState();
    renderAll();
  },
  toggleMonth(mi) {
    const detail = document.querySelector('[data-detail="' + mi + '"]');
    const arrow = document.querySelector('.tl-arrow[data-mi="' + mi + '"]');
    if (detail) detail.classList.toggle('hidden');
    if (arrow) arrow.classList.toggle('open');
  },
  addYearlyPlan() {
    state.yearlyPlans.push({ id: nextId(), ci: state.children.length ? state.children[0].id : '', year: new Date().getFullYear() + 1, days: 10 });
    saveState();
    renderAll();
  },
  removeYearlyPlan(idx) {
    state.yearlyPlans.splice(idx, 1);
    saveState();
    renderAll();
  },
  updateYearlyPlan(idx, field, value) {
    state.yearlyPlans[idx][field] = field === 'days' || field === 'year' ? Number(value) : value;
    saveState();
    renderAll();
  },
};

function renderAll() {
  state.rules.sort((a, b) => (a.start || '').localeCompare(b.start || ''));
  if (state.yearlyPlans) state.yearlyPlans.sort((a, b) => (a.year || 0) - (b.year || 0));
  const timeline = calculateTimeline();
  document.getElementById('left-pane').innerHTML = renderConfig();
  document.getElementById('right-pane').innerHTML = renderResults(timeline);
}

// --- INIT ---
loadState();
renderAll();
ensureKommunerLoaded().then(() => {
  for (const p of state.parents) {
    const tn = getTabellNr(p.kommun, p.forsamling, p.churchTax);
    if (tn) ensureTabellLoaded(tn);
  }
});
</script>
</body>
</html>
