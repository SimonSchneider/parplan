<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Föräldrapenning Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <style>
    .parent-0 { --pc: #2563eb; --pbg: #eff6ff; --pborder: #bfdbfe; }
    .parent-1 { --pc: #be185d; --pbg: #fdf2f8; --pborder: #fbcfe8; }
    .bar { transition: width 0.3s ease; }
    input[type="number"] { -moz-appearance: textfield; appearance: textfield; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .tooltip { position: relative; }
    .tooltip .tip { display: none; position: absolute; z-index: 50; bottom: 100%; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: white; padding: 6px 10px; border-radius: 6px; font-size: 12px; white-space: nowrap; margin-bottom: 4px; }
    .tooltip:hover .tip { display: block; }
    .tl-arrow { transition: transform 0.15s; display: inline-block; }
    .tl-arrow.open { transform: rotate(90deg); }
    .collapsible-section summary::-webkit-details-marker { display: none; }
    .collapsible-section .collapsible-chevron { transition: transform 0.2s; }
    .collapsible-section[open] .collapsible-chevron { transform: rotate(180deg); }
    @media (max-width: 768px) { .desktop-only { display: none; } }
    .year-cal-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .year-cal-grid { display: grid; grid-auto-rows: 14px; gap: 1px; user-select: none; }
    .year-cal-wk { font-size: 9px; color: #64748b; text-align: right; padding-right: 4px; line-height: 14px; }
    .year-cal-month { font-size: 9px; color: #0f172a; text-align: left; padding-left: 2px; line-height: 14px; font-weight: 500; }
    .year-cal-hd { font-size: 8px; color: #94a3b8; text-align: center; line-height: 12px; }
    .year-cal-cell { width: 10px; height: 12px; min-width: 10px; border-radius: 1px; cursor: pointer; box-sizing: border-box; }
    .year-cal-cell.out { background: #f1f5f9; cursor: default; }
    .year-cal-cell.weekend { opacity: 0.85; }
    .year-cal-cell.month-start { outline: 1px solid #64748b; outline-offset: -1px; }
    .pane-divider { width: 8px; cursor: col-resize; background: transparent; position: relative; }
    .pane-divider::before { content: ''; position: absolute; left: 3px; top: 0; bottom: 0; width: 2px; background: #e2e8f0; border-radius: 1px; }
    .pane-divider.dragging::before { background: #94a3b8; }
    @media (max-width: 1023px) { .pane-divider { display: none; } }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

<div class="max-w-[1920px] mx-auto px-4 py-6">
  <header class="mb-6">
    <div class="flex items-center gap-3 mb-2">
      <div class="w-10 h-7 rounded overflow-hidden flex flex-col">
        <div class="flex-1 bg-blue-600"></div>
        <div class="h-[6px] bg-yellow-400"></div>
        <div class="flex-1 bg-blue-600"></div>
      </div>
      <h1 class="text-2xl font-bold text-slate-900">Föräldrapenning Planner</h1>
    </div>
    <p class="text-slate-500 text-sm">Plan parental leave for two parents. Rules based on Försäkringskassan 2026.</p>
  </header>

  <div id="pane-row" class="flex flex-col lg:flex-row min-h-[calc(100vh-120px)]">
    <div id="left-pane" class="flex-1 lg:flex-[0_0_38%] space-y-4 overflow-y-auto lg:max-h-[calc(100vh-120px)] pr-0 lg:pr-3"></div>
    <div id="pane-divider" class="pane-divider"></div>
    <div id="right-pane" class="flex-1 lg:flex-[0_0_62%] space-y-4 overflow-y-auto lg:max-h-[calc(100vh-120px)] pl-0 lg:pl-3"></div>
  </div>
</div>

<script>
const FK = {
  SJUK_DAYS_TOTAL: 390,
  LAGSTA_DAYS_TOTAL: 90,
  SJUK_PER_PARENT: 195,
  LAGSTA_PER_PARENT: 45,
  RESERVED_SJUK: 90,
  LAGSTA_DAILY: 180,
  MIN_SJUK_DAILY: 250,
  MAX_SJUK_DAILY: 1259,
  MAX_SGI: 592000,
  FIRST_SJUK_REQUIREMENT: 180,
  SAVE_LIMIT_4YR: 96,
  PRISBASBELOPP: 59200,
};

let _id = 0;
function nextId() { return 'id' + (++_id) + '_' + Date.now().toString(36); }

// --- TAX API ---

const SKV_KOMMUN_URL = 'https://skatteverket.entryscape.net/rowstore/dataset/c67b320b-ffee-4876-b073-dd9236cd2a99';
const SKV_TABELL_URL = 'https://skatteverket.entryscape.net/rowstore/dataset/88320397-5c32-4c16-ae79-d36d95b17b95';
const TAX_YEAR = '2026';
const CACHE_TTL_MS = 7 * 24 * 60 * 60 * 1000;

const taxCache = { kommuner: null, tabeller: {} };

function cacheGet(key) {
  try {
    const raw = localStorage.getItem('skv_' + key);
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL_MS) { localStorage.removeItem('skv_' + key); return null; }
    return data;
  } catch { return null; }
}

function cacheSet(key, data) {
  try { localStorage.setItem('skv_' + key, JSON.stringify({ ts: Date.now(), data })); } catch {}
}

async function fetchAllPages(baseUrl, params, maxPerPage = 500) {
  const all = [];
  let offset = 0;
  while (true) {
    const url = new URL(baseUrl);
    for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
    url.searchParams.set('_limit', maxPerPage);
    url.searchParams.set('_offset', offset);
    const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
    const json = await resp.json();
    all.push(...json.results);
    if (all.length >= json.resultCount || json.results.length < maxPerPage) break;
    offset += json.results.length;
  }
  return all;
}

async function loadKommuner() {
  if (taxCache.kommuner) return taxCache.kommuner;
  const cached = cacheGet('kommuner_' + TAX_YEAR);
  if (cached) { taxCache.kommuner = cached; return cached; }

  const rows = await fetchAllPages(SKV_KOMMUN_URL, { 'år': TAX_YEAR });
  const byKommun = {};
  for (const r of rows) {
    const k = r['kommun'];
    if (!byKommun[k]) byKommun[k] = [];
    byKommun[k].push({
      forsamling: r['församling'],
      inkl: parseFloat(r['summa, inkl. kyrkoavgift']),
      exkl: parseFloat(r['summa, exkl. kyrkoavgift']),
    });
  }
  taxCache.kommuner = byKommun;
  cacheSet('kommuner_' + TAX_YEAR, byKommun);
  return byKommun;
}

async function loadSkattetabell(tabellNr) {
  const key = 'tabell_' + TAX_YEAR + '_' + tabellNr;
  if (taxCache.tabeller[tabellNr]) return taxCache.tabeller[tabellNr];
  const cached = cacheGet(key);
  if (cached) { taxCache.tabeller[tabellNr] = cached; return cached; }

  const rows = await fetchAllPages(SKV_TABELL_URL, { 'år': TAX_YEAR, 'tabellnr': String(tabellNr) });
  const table = rows.map(r => ({
    from: parseInt(r['inkomst fr.o.m.'], 10),
    to: parseInt(r['inkomst t.o.m.'], 10),
    col1: parseInt(r['kolumn 1'], 10) || 0,
    col5: parseInt(r['kolumn 5'], 10) || 0,
    col6: parseInt(r['kolumn 6'], 10) || 0,
  })).sort((a, b) => a.from - b.from);
  taxCache.tabeller[tabellNr] = table;
  cacheSet(key, table);
  return table;
}

function lookupTax(grossMonthly, table, column = 'col1') {
  if (!table || !table.length) return null;
  const amount = Math.round(grossMonthly);
  if (amount <= 0) return 0;
  for (const row of table) {
    if (amount >= row.from && amount <= row.to) return row[column];
  }
  return table[table.length - 1][column];
}

function getTabellNr(kommun, forsamling, churchTax) {
  if (!taxCache.kommuner || !kommun || !forsamling) return null;
  const kommunData = taxCache.kommuner[kommun];
  if (!kommunData) return null;
  const f = kommunData.find(x => x.forsamling === forsamling);
  if (!f) return null;
  const rate = churchTax ? f.inkl : f.exkl;
  return Math.round(rate);
}

let kommunerLoaded = false;
let kommunerLoading = false;

async function ensureKommunerLoaded() {
  if (kommunerLoaded || kommunerLoading) return;
  kommunerLoading = true;
  try {
    await loadKommuner();
    kommunerLoaded = true;
    renderAll();
  } catch (e) { console.error('Failed to load kommuner', e); }
  kommunerLoading = false;
}

async function ensureTabellLoaded(tabellNr) {
  if (!tabellNr || taxCache.tabeller[tabellNr]) return;
  try {
    await loadSkattetabell(tabellNr);
    renderAll();
  } catch (e) { console.error('Failed to load tabell ' + tabellNr, e); }
}

function defaultState() {
  return {
    children: [],
    parents: [
      { name: 'Parent 1', salary: 45000, topups: [], kommun: '', forsamling: '', churchTax: false },
      { name: 'Parent 2', salary: 40000, topups: [], kommun: '', forsamling: '', churchTax: false },
    ],
    rules: [],
    yearlyPlans: [],
    calendarYear: new Date().getFullYear(),
    calendarYearStart: new Date().getFullYear(),
    calendarYearEnd: new Date().getFullYear(),
    calendarVacation: [],
    calendarParentalOverrides: {},
  };
}

let state = defaultState();

function saveState() {
  try {
    const json = JSON.stringify(state);
    const compressed = LZString.compressToEncodedURIComponent(json);
    history.replaceState(null, '', '#' + compressed);
  } catch (e) { console.error('Save failed', e); }
}

function loadState() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  try {
    const json = LZString.decompressFromEncodedURIComponent(hash);
    if (json) {
      const loaded = JSON.parse(json);
      state = { ...defaultState(), ...loaded };
      state.parents = (state.parents || defaultState().parents).map(p => ({
        kommun: '', forsamling: '', churchTax: false, topups: [], ...p,
      }));
      state.children = (state.children || []).map(c => ({
        ...c,
        preschoolDate: c.preschoolDate || '',
        usedDays: c.usedDays || [{ sjuk: 0, lagsta: 0 }, { sjuk: 0, lagsta: 0 }],
      }));
      state.rules = state.rules || [];
      state.yearlyPlans = state.yearlyPlans || [];
      state.calendarYear = Number(state.calendarYear) || defaultState().calendarYear;
      state.calendarYearStart = Number(state.calendarYearStart) || state.calendarYear;
      state.calendarYearEnd = Number(state.calendarYearEnd) || state.calendarYearStart;
      if (state.calendarYearEnd < state.calendarYearStart) state.calendarYearEnd = state.calendarYearStart;
      state.calendarVacation = state.calendarVacation || [];
      state.calendarParentalOverrides = state.calendarParentalOverrides && typeof state.calendarParentalOverrides === 'object'
        ? state.calendarParentalOverrides
        : {};
    }
  } catch (e) { console.error('Load failed', e); }
}

function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }

function monthName(m) {
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m - 1];
}

function formatKr(n) {
  return Math.round(n).toLocaleString('sv-SE');
}

function parseDate(s) {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function toYMD(d) {
  if (!d) return '';
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function addDaysDate(d, n) {
  const x = new Date(d.getTime());
  x.setDate(x.getDate() + n);
  return x;
}

function easterSundayWestern(y) {
  const a = y % 19;
  const b = Math.floor(y / 100);
  const c = y % 100;
  const d = Math.floor(b / 4);
  const e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4);
  const k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31);
  const day = ((h + l - 7 * m + 114) % 31) + 1;
  return new Date(y, month - 1, day);
}

function midsummerSaturday(y) {
  for (let dom = 20; dom <= 26; dom++) {
    const dt = new Date(y, 5, dom);
    if (dt.getDay() === 6) return dt;
  }
  return new Date(y, 5, 20);
}

function allSaintsSaturday(y) {
  const seq = [[9, 31], [10, 1], [10, 2], [10, 3], [10, 4], [10, 5], [10, 6]];
  for (const [mo, dom] of seq) {
    const dt = new Date(y, mo, dom);
    if (dt.getDay() === 6) return dt;
  }
  return new Date(y, 10, 1);
}

function getSwedishPublicHolidaysList(y) {
  const E = easterSundayWestern(y);
  const midsommar = midsummerSaturday(y);
  const out = [];
  const push = (d, name) => out.push({ date: toYMD(d), name });
  push(new Date(y, 0, 1), 'Nyårsdagen');
  push(new Date(y, 11, 31), 'Nyårsafton');
  push(new Date(y, 0, 6), 'Trettondedag jul');
  push(addDaysDate(E, -2), 'Långfredagen');
  push(addDaysDate(E, -1), 'Påskafton');
  push(E, 'Påskdagen');
  push(addDaysDate(E, 1), 'Annandag påsk');
  push(new Date(y, 4, 1), 'Första maj');
  push(addDaysDate(E, 39), 'Kristi himmelsfärdsdag');
  push(addDaysDate(E, 49), 'Pingstdagen');
  push(new Date(y, 5, 6), 'Nationaldagen');
  push(addDaysDate(midsommar, -1), 'Midsommarafton');
  push(midsommar, 'Midsommardagen');
  push(allSaintsSaturday(y), 'Alla helgons dag');
  push(new Date(y, 11, 24), 'Julafton');
  push(new Date(y, 11, 25), 'Juldagen');
  push(new Date(y, 11, 26), 'Annandag jul');
  out.sort((a, b) => a.date.localeCompare(b.date));
  const seen = new Set();
  return out.filter(h => {
    if (seen.has(h.date)) return false;
    seen.add(h.date);
    return true;
  });
}

function swedishHolidayMapForYear(y) {
  const m = {};
  for (const h of getSwedishPublicHolidaysList(y)) m[h.date] = h.name;
  return m;
}

function isWeekdayDate(d) {
  const day = d.getDay();
  return day >= 1 && day <= 5;
}

function buildCalendarWeekRows(year) {
  const jan1 = new Date(year, 0, 1);
  const dec31 = new Date(year, 11, 31);
  const mondayOf = (d) => {
    const x = new Date(d.getTime());
    const dow = (x.getDay() + 6) % 7;
    x.setDate(x.getDate() - dow);
    return x;
  };
  let mon = mondayOf(jan1);
  const rows = [];
  while (true) {
    const days = [];
    let anyInYear = false;
    for (let i = 0; i < 7; i++) {
      const d = addDaysDate(mon, i);
      if (d.getFullYear() === year) {
        anyInYear = true;
        days.push(toYMD(d));
      } else {
        days.push(null);
      }
    }
    if (!anyInYear && mon > dec31) break;
    if (anyInYear) {
      const iso = isoWeekNumber(mon);
      rows.push({ monday: toYMD(mon), weekNum: iso.week, isoYear: iso.year, days });
    }
    mon = addDaysDate(mon, 7);
    if (mon > addDaysDate(dec31, 6)) break;
  }
  return rows;
}

function isoWeekNumber(anyDate) {
  const d = new Date(anyDate.getTime());
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + 3 - ((d.getDay() + 6) % 7));
  const week1 = new Date(d.getFullYear(), 0, 4);
  return {
    week: 1 + Math.round(((d.getTime() - week1.getTime()) / 86400000 - 3 + ((week1.getDay() + 6) % 7)) / 7),
    year: d.getFullYear(),
  };
}

function countIsoWeeksTouchingRange(rStart, rEnd) {
  const seen = new Set();
  for (let d = new Date(rStart.getTime()); d <= rEnd; d.setDate(d.getDate() + 1)) {
    const { week, year } = isoWeekNumber(d);
    seen.add(year + '\0' + week);
  }
  return seen.size;
}

function ruleLeaveBudgetFromIsoWeeks(rule) {
  const rStart = parseDate(rule.start);
  const rEnd = parseDate(rule.end);
  if (!rStart || !rEnd || rStart > rEnd) return null;
  const spanDays = Math.round((rEnd - rStart) / 86400000) + 1;
  if (spanDays <= 0) return null;
  const weeks = countIsoWeeksTouchingRange(rStart, rEnd);
  const dpw = Math.max(1, Math.min(7, Number(rule.dpw) || 0));
  return { totalLeave: weeks * dpw, spanDays };
}

function deriveParentalFromRules(year) {
  const byDate = {};
  const childIds = new Set(state.children.map(c => c.id));

  for (const rule of state.rules) {
    if (!rule.start || !rule.end || rule.ci == null || !childIds.has(rule.ci)) continue;
    const rStart = parseDate(rule.start);
    const rEnd = parseDate(rule.end);
    if (!rStart || !rEnd || rStart > rEnd) continue;
    const pi = rule.pi;
    const ci = rule.ci;
    const dpw = Math.max(1, Math.min(7, Number(rule.dpw) || 0));
    const nPerWeek = Math.min(7, Math.round(dpw));

    let mon = mondayOfDate(rStart);
    const lastWeekStart = mondayOfDate(rEnd);
    while (mon <= lastWeekStart) {
      const candidates = [];
      for (let i = 0; i < 7; i++) {
        const d = addDaysDate(mon, i);
        if (d < rStart || d > rEnd) continue;
        if (d.getFullYear() !== year) continue;
        candidates.push(toYMD(d));
      }
      candidates.sort();
      for (let k = 0; k < nPerWeek && k < candidates.length; k++) {
        const key = candidates[k];
        if (!byDate[key]) byDate[key] = {};
        byDate[key][pi] = { ci };
      }
      mon = addDaysDate(mon, 7);
    }
  }
  return byDate;
}

function mondayOfDate(d) {
  const x = new Date(d.getTime());
  const dow = (x.getDay() + 6) % 7;
  x.setDate(x.getDate() - dow);
  x.setHours(0, 0, 0, 0);
  return x;
}

function vacationDateSetForParent(pi) {
  const set = new Set();
  for (const seg of state.calendarVacation || []) {
    if (seg.pi !== pi || !seg.start || !seg.end) continue;
    const a = parseDate(seg.start);
    const b = parseDate(seg.end);
    if (!a || !b || a > b) continue;
    for (let d = new Date(a.getTime()); d <= b; d.setDate(d.getDate() + 1)) {
      set.add(toYMD(d));
    }
  }
  return set;
}

function mergeVacationRanges(pi) {
  const ranges = (state.calendarVacation || []).filter(s => s.pi === pi && s.start && s.end).map(s => ({
    start: parseDate(s.start),
    end: parseDate(s.end),
    id: s.id,
  })).filter(x => x.start && x.end && x.start <= x.end).sort((a, b) => a.start - b.start);
  const merged = [];
  for (const r of ranges) {
    if (!merged.length || r.start > addDaysDate(merged[merged.length - 1].end, 1)) {
      merged.push({ start: new Date(r.start), end: new Date(r.end), id: r.id });
    } else {
      const last = merged[merged.length - 1];
      if (r.end > last.end) last.end = new Date(r.end.getTime());
    }
  }
  state.calendarVacation = (state.calendarVacation || []).filter(s => s.pi !== pi);
  for (const m of merged) {
    state.calendarVacation.push({ id: m.id || nextId(), pi, start: toYMD(m.start), end: toYMD(m.end) });
  }
}

function toggleVacationDay(pi, dateKey) {
  const set = vacationDateSetForParent(pi);
  const dk = parseDate(dateKey);
  if (!dk) return;
  if (set.has(dateKey)) {
    const next = [];
    for (const seg of state.calendarVacation || []) {
      if (seg.pi !== pi) {
        next.push(seg);
        continue;
      }
      const a = parseDate(seg.start);
      const b = parseDate(seg.end);
      if (!a || !b || a > b) continue;
      if (dk < a || dk > b) {
        next.push(seg);
        continue;
      }
      if (toYMD(a) === dateKey && toYMD(b) === dateKey) continue;
      if (dk > a) next.push({ id: seg.id, pi, start: toYMD(a), end: toYMD(addDaysDate(dk, -1)) });
      if (dk < b) next.push({ id: nextId(), pi, start: toYMD(addDaysDate(dk, 1)), end: toYMD(b) });
    }
    state.calendarVacation = next;
  } else {
    if (!state.calendarVacation) state.calendarVacation = [];
    state.calendarVacation.push({ id: nextId(), pi, start: dateKey, end: dateKey });
    mergeVacationRanges(pi);
  }
}

function childIdSet() {
  return new Set(state.children.map(c => c.id));
}

function derivedCiForParent(der, pi, childIds) {
  const x = der[pi];
  return x && childIds.has(x.ci) ? x.ci : null;
}

function slotFromDerived(der, pi, childIds) {
  const ci = derivedCiForParent(der, pi, childIds);
  return ci ? { pi, ci } : null;
}

function isLegacyParentalOverride(ovr) {
  return ovr && typeof ovr === 'object' && ovr.pi != null && ovr.ci != null && !('0' in ovr) && !('1' in ovr);
}

function isDualParentalOverride(ovr) {
  return ovr && typeof ovr === 'object' && ('0' in ovr || '1' in ovr);
}

/** Effective FP slots before semester mask; `derivedParental[dateKey]` is `{ 0?: {ci}, 1?: {ci} }`. */
function resolveParentalSlotsBeforeVacation(dateKey, derivedByDate) {
  const childIds = childIdSet();
  const der = derivedByDate[dateKey] || {};
  const ovr = (state.calendarParentalOverrides || {})[dateKey];

  if (ovr === 'off') return { 0: null, 1: null };

  if (isLegacyParentalOverride(ovr)) {
    const c = childIds.has(ovr.ci) ? ovr.ci : null;
    return {
      0: ovr.pi === 0 && c ? { pi: 0, ci: c } : null,
      1: ovr.pi === 1 && c ? { pi: 1, ci: c } : null,
    };
  }

  if (isDualParentalOverride(ovr)) {
    return {
      0: Object.prototype.hasOwnProperty.call(ovr, '0')
        ? (ovr[0] && childIds.has(ovr[0]) ? { pi: 0, ci: ovr[0] } : null)
        : slotFromDerived(der, 0, childIds),
      1: Object.prototype.hasOwnProperty.call(ovr, '1')
        ? (ovr[1] && childIds.has(ovr[1]) ? { pi: 1, ci: ovr[1] } : null)
        : slotFromDerived(der, 1, childIds),
    };
  }

  return {
    0: slotFromDerived(der, 0, childIds),
    1: slotFromDerived(der, 1, childIds),
  };
}

function applyVacationMaskToSlots(slots, dateKey) {
  return {
    0: slots[0] && !vacationDateSetForParent(0).has(dateKey) ? slots[0] : null,
    1: slots[1] && !vacationDateSetForParent(1).has(dateKey) ? slots[1] : null,
  };
}

function resolveParentalSlots(dateKey, derivedByDate) {
  const raw = resolveParentalSlotsBeforeVacation(dateKey, derivedByDate);
  return applyVacationMaskToSlots(raw, dateKey);
}

function slotsMatchDerived(slots, der, childIds) {
  const cid = s => (s ? s.ci : null);
  return cid(slots[0]) === derivedCiForParent(der, 0, childIds) && cid(slots[1]) === derivedCiForParent(der, 1, childIds);
}

function writeParentalOverrideFromSlots(dateKey, derivedByDate, slots) {
  if (!state.calendarParentalOverrides || typeof state.calendarParentalOverrides !== 'object')
    state.calendarParentalOverrides = {};
  const childIds = childIdSet();
  const der = derivedByDate[dateKey] || {};

  if (slotsMatchDerived(slots, der, childIds)) {
    delete state.calendarParentalOverrides[dateKey];
    return;
  }

  const cid0 = slots[0] ? slots[0].ci : null;
  const cid1 = slots[1] ? slots[1].ci : null;
  if (cid0 === null && cid1 === null) {
    if (derivedCiForParent(der, 0, childIds) || derivedCiForParent(der, 1, childIds))
      state.calendarParentalOverrides[dateKey] = 'off';
    else delete state.calendarParentalOverrides[dateKey];
    return;
  }

  state.calendarParentalOverrides[dateKey] = { 0: cid0, 1: cid1 };
}

function resolveParentalAssignment(dateKey, derivedParental) {
  const ovr = (state.calendarParentalOverrides || {})[dateKey];
  const slots = resolveParentalSlots(dateKey, derivedParental);
  return { slots, parental: slots[0] || slots[1] || null, overrideRaw: ovr };
}

/** Semester wins over föräldraledighet for the same parent on the same day (state is cleaned on paint; this keeps display/timeline consistent if data is stale). */
function clearParentalForParentOnDate(pi, dateKey) {
  if (!state.calendarParentalOverrides || typeof state.calendarParentalOverrides !== 'object')
    state.calendarParentalOverrides = {};
  const d = parseDate(dateKey);
  const y = d ? d.getFullYear() : (state.calendarYear || new Date().getFullYear());
  const derived = deriveParentalFromRules(y);
  const slots = resolveParentalSlotsBeforeVacation(dateKey, derived);
  if (!slots[pi]) return;
  writeParentalOverrideFromSlots(dateKey, derived, { ...slots, [pi]: null });
}

function resolveCalendarDay(year, dateKey, derivedParental) {
  const holMap = swedishHolidayMapForYear(year);
  const assignment = resolveParentalAssignment(dateKey, derivedParental);
  const slots = assignment.slots;
  const der = derivedParental[dateKey] || {};
  const childIds = childIdSet();

  const v0 = vacationDateSetForParent(0).has(dateKey);
  const v1 = vacationDateSetForParent(1).has(dateKey);

  return {
    dateKey,
    holidayName: holMap[dateKey] || null,
    parentalSlots: slots,
    vacationPi: v0 && v1 ? 'both' : v0 ? 0 : v1 ? 1 : null,
    derivedParental: der,
    derivedHasAny: !!(derivedCiForParent(der, 0, childIds) || derivedCiForParent(der, 1, childIds)),
    overrideRaw: assignment.overrideRaw,
  };
}

const YEAR_CAL_VACATION_RGBA = 'rgba(96, 165, 250, 0.82)';
const YEAR_CAL_CHILD_FP_RGBA = [
  'rgba(16, 185, 129, 0.8)',
  'rgba(245, 158, 11, 0.82)',
  'rgba(124, 58, 237, 0.78)',
  'rgba(234, 88, 12, 0.82)',
  'rgba(20, 184, 166, 0.8)',
  'rgba(132, 204, 22, 0.82)',
];

function yearCalFpColorForChildId(cid) {
  const i = state.children.findIndex(c => c.id === cid);
  if (i < 0) return 'rgba(71, 85, 105, 0.78)';
  return YEAR_CAL_CHILD_FP_RGBA[i % YEAR_CAL_CHILD_FP_RGBA.length];
}

function yearCalSolidLayer(color) {
  return `linear-gradient(${color},${color})`;
}

function yearCalCellBackgroundLayersForParent(info, pi) {
  const topFirst = [];
  if (info.vacationPi === pi || info.vacationPi === 'both')
    topFirst.push(yearCalSolidLayer(YEAR_CAL_VACATION_RGBA));
  const slot = info.parentalSlots[pi];
  if (slot) topFirst.push(yearCalSolidLayer(yearCalFpColorForChildId(slot.ci)));
  return topFirst;
}

function buildYearCalGridHtmlForParent(y, derived, pi) {
  const rows = buildCalendarWeekRows(y);
  const hdrs = ['M', 'T', 'O', 'T', 'F', 'L', 'S'];
  const cells = [];
  cells.push(`<div class="year-cal-hd"></div>`);
  cells.push(`<div class="year-cal-hd">Mon</div>`);
  for (const h of hdrs) cells.push(`<div class="year-cal-hd">${h}</div>`);
  for (const row of rows) {
    cells.push(`<div class="year-cal-wk">${row.weekNum}</div>`);
    const monthStart = row.days.find(dk => dk && dk.endsWith('-01'));
    const monthLabel = monthStart ? parseDate(monthStart).toLocaleString('sv-SE', { month: 'short' }).replace('.', '') : '';
    cells.push(`<div class="year-cal-month">${esc(monthLabel)}</div>`);
    for (let i = 0; i < 7; i++) {
      const dk = row.days[i];
      if (!dk) {
        cells.push(`<div class="year-cal-cell out"></div>`);
        continue;
      }
      const d = parseDate(dk);
      const weekend = d && (d.getDay() === 0 || d.getDay() === 6);
      const info = resolveCalendarDay(y, dk, derived);
      const parts = [];
      if (info.holidayName) parts.push(info.holidayName);
      if (info.vacationPi === 'both' || info.vacationPi === pi)
        parts.push('Semester: ' + state.parents[pi].name);
      const s = info.parentalSlots[pi];
      if (s) {
        const ch = state.children.find(c => c.id === s.ci);
        parts.push('FP' + (ch ? ' / ' + ch.name : ''));
      }
      if (info.overrideRaw === 'off' && info.derivedHasAny) parts.push('(regel dold)');
      const title = dk + (parts.length ? ' — ' + parts.join(', ') : '');
      let base = '#f8fafc';
      if (info.holidayName) base = '#fecaca';
      else if (weekend) base = '#e2e8f0';
      const layers = yearCalCellBackgroundLayersForParent(info, pi);
      const finalStyle = layers.length
        ? `background-color:${base};background-image:${layers.join(',')}`
        : `background-color:${base}`;
      const monthStartCls = d && d.getDate() === 1 ? ' month-start' : '';
      const cls = 'year-cal-cell' + (weekend ? ' weekend' : '') + monthStartCls;
      const ev = `onmousedown="actions.calendarCellDown(event,'${esc(dk)}')" onmouseenter="actions.calendarCellEnter('${esc(dk)}')"`;
      cells.push(`<div class="${cls}" style="${finalStyle}" title="${esc(title)}" data-cal-date="${esc(dk)}" ${ev}></div>`);
    }
  }
  return cells.join('');
}

      ${fpBits}

function computeYearCalendarStats(year) {
  const vac = [0, 0];
  const parentalByChild = {};
  const parentalByParent = [0, 0];
  for (const c of state.children) parentalByChild[c.id] = 0;

  // Vacation year: Apr 1 (year) -> Mar 31 (year + 1)
  const vacSet0 = vacationDateSetForParent(0);
  const vacSet1 = vacationDateSetForParent(1);
  const holMapA = swedishHolidayMapForYear(year);
  const holMapB = swedishHolidayMapForYear(year + 1);
  const vacStart = new Date(year, 3, 1);
  const vacEnd = new Date(year + 1, 2, 31);
  for (let d = new Date(vacStart.getTime()); d <= vacEnd; d.setDate(d.getDate() + 1)) {
    if (!isWeekdayDate(d)) continue;
    const key = toYMD(d);
    const hol = d.getFullYear() === year ? holMapA[key] : holMapB[key];
    if (hol) continue;
    if (vacSet0.has(key)) vac[0]++;
    if (vacSet1.has(key)) vac[1]++;
  }

  const timeline = calculateTimeline();
  for (const m of (timeline.months || [])) {
    if (m.year !== year) continue;
    for (const pi of [0, 1]) {
      const lbc = m.parents[pi].leaveByChild || {};
      for (const ci in lbc) {
        const d = (lbc[ci].sjuk || 0) + (lbc[ci].lagsta || 0);
        parentalByParent[pi] += d;
        if (parentalByChild[ci] != null) parentalByChild[ci] += d;
      }
    }
  }

  return { vacationWeekdays: vac, parentalByChild, parentalByParent };
}

let calendarPaint = { active: false, pi: 0, mode: 'vacation', interaction: 'paint', dragAdd: true };
let calendarSelectedChildId = '';
let calendarRenderRaf = null;

function scheduleCalendarRender() {
  if (calendarRenderRaf) return;
  calendarRenderRaf = requestAnimationFrame(() => {
    calendarRenderRaf = null;
    saveState();
    renderAll();
  });
}

document.addEventListener('mouseup', () => {
  if (calendarRenderRaf) {
    cancelAnimationFrame(calendarRenderRaf);
    calendarRenderRaf = null;
    saveState();
    renderAll();
  }
  calendarPaint.active = false;
});

function dateToMonthKey(d) {
  return d.getFullYear() * 100 + (d.getMonth() + 1);
}

function addMonths(dateStr, months) {
  const d = parseDate(dateStr);
  if (!d) return null;
  d.setMonth(d.getMonth() + months);
  return d;
}

function calcDailyRate(monthlySalary) {
  const sgi = Math.min(monthlySalary * 12, FK.MAX_SGI);
  const rate = sgi * 0.97 * 0.80 / 365;
  return Math.max(FK.MIN_SJUK_DAILY, Math.min(rate, FK.MAX_SJUK_DAILY));
}

function getSharedPoolRemaining(childId, consumed) {
  const c = consumed[childId];
  const sjukUsed = [c[0].sjuk, c[1].sjuk];
  const lagstaUsed = [c[0].lagsta, c[1].lagsta];
  const totalSjukUsed = sjukUsed[0] + sjukUsed[1];
  const totalLagstaUsed = lagstaUsed[0] + lagstaUsed[1];
  const maxPerParent = FK.SJUK_DAYS_TOTAL - FK.RESERVED_SJUK;
  return [0, 1].map(pi => ({
    sjuk: Math.max(0, Math.min(maxPerParent - sjukUsed[pi], FK.SJUK_DAYS_TOTAL - totalSjukUsed)),
    lagsta: Math.max(0, FK.LAGSTA_DAYS_TOTAL - totalLagstaUsed),
  }));
}

function calculateTimeline() {
  if (!state.children.length) return { months: [], consumed: {}, warnings: [] };

  let minDate = null, maxDate = null;
  for (const c of state.children) {
    if (c.birthDate) {
      const d = parseDate(c.birthDate);
      if (!minDate || d < minDate) minDate = new Date(d);
    }
  }
  for (const r of state.rules) {
    if (r.start) {
      const d = parseDate(r.start);
      if (!minDate || d < minDate) minDate = new Date(d);
    }
    if (r.end) {
      const d = parseDate(r.end);
      if (!maxDate || d > maxDate) maxDate = new Date(d);
    }
  }
  for (const [dateKey, v] of Object.entries(state.calendarParentalOverrides || {})) {
    if (!(v && typeof v === 'object' && v.pi != null && v.ci)) continue;
    const d = parseDate(dateKey);
    if (!d) continue;
    if (!minDate || d < minDate) minDate = new Date(d);
    if (!maxDate || d > maxDate) maxDate = new Date(d);
  }
  for (const seg of (state.calendarVacation || [])) {
    const a = parseDate(seg.start);
    const b = parseDate(seg.end);
    if (a && (!minDate || a < minDate)) minDate = new Date(a);
    if (b && (!maxDate || b > maxDate)) maxDate = new Date(b);
  }
  if (!minDate) return { months: [], consumed: {}, warnings: [] };
  if (!maxDate) {
    maxDate = new Date(minDate);
    maxDate.setFullYear(maxDate.getFullYear() + 2);
  }

  const months = [];
  let y = minDate.getFullYear(), m = minDate.getMonth() + 1;
  const ey = maxDate.getFullYear(), em = maxDate.getMonth() + 1;
  while (y < ey || (y === ey && m <= em)) {
    months.push({ year: y, month: m });
    m++;
    if (m > 12) { m = 1; y++; }
  }

  const consumed = {};
  for (const c of state.children) {
    const ud = c.usedDays || [{ sjuk: 0, lagsta: 0 }, { sjuk: 0, lagsta: 0 }];
    consumed[c.id] = [
      { sjuk: ud[0].sjuk || 0, lagsta: ud[0].lagsta || 0 },
      { sjuk: ud[1].sjuk || 0, lagsta: ud[1].lagsta || 0 },
    ];
  }

  const topupMonths = [{}, {}];

  const monthResults = months.map(({ year, month }) => {
    const mStart = new Date(year, month - 1, 1);
    const mEnd = new Date(year, month, 0);
    const mDays = daysInMonth(year, month);

    const parentResults = [0, 1].map(pi => {
      let totalLeaveDays = 0;
      let totalLeaveIncome = 0;
      const leaveByChild = {};

      const childIds = new Set(state.children.map(c => c.id));
      const derivedForYear = deriveParentalFromRules(year);

      const vacSet = vacationDateSetForParent(pi);
      const prePreschoolWeekKeys = new Set();
      const daysByChild = {};
      for (let day = 1; day <= mDays; day++) {
        const dateObj = new Date(year, month - 1, day);
        const key = toYMD(dateObj);
        if (vacSet.has(key)) continue;
        const assignment = resolveParentalAssignment(key, derivedForYear);
        const p = assignment.slots[pi];
        if (!p || !childIds.has(p.ci)) continue;
        if (!daysByChild[p.ci]) daysByChild[p.ci] = 0;
        daysByChild[p.ci] += 1;
        const iw = isoWeekNumber(dateObj);
        const ch = state.children.find(c => c.id === p.ci);
        const ps = ch && ch.preschoolDate ? parseDate(ch.preschoolDate) : null;
        if (!ps || dateObj < ps) prePreschoolWeekKeys.add(iw.year + '|' + iw.week);
        if (!topupMonths[pi][p.ci]) topupMonths[pi][p.ci] = 0;
      }

      let paidCalendarDays = 0;
      for (let day = 1; day <= mDays; day++) {
        const dateObj = new Date(year, month - 1, day);
        const key = toYMD(dateObj);
        if (vacSet.has(key)) {
          paidCalendarDays += 1;
          continue;
        }
        const assignment = resolveParentalAssignment(key, derivedForYear);
        const p = assignment.slots[pi];
        if (p && childIds.has(p.ci)) {
          const ch = state.children.find(c => c.id === p.ci);
          const ps = ch && ch.preschoolDate ? parseDate(ch.preschoolDate) : null;
          if (ps && dateObj >= ps) continue;
        }
        const iw = isoWeekNumber(dateObj);
        const wkKey = iw.year + '|' + iw.week;
        if (!prePreschoolWeekKeys.has(wkKey)) paidCalendarDays += 1;
      }

      const sjukRate = calcDailyRate(state.parents[pi].salary);
      for (const ci in daysByChild) {
        const daysNeeded = daysByChild[ci];
        const pool = getSharedPoolRemaining(ci, consumed);
        const sjukRemaining = pool[pi].sjuk;
        const lagstaRemaining = pool[pi].lagsta;
        const totalChildSjuk = consumed[ci][0].sjuk + consumed[ci][1].sjuk;
        const lagstaUnlocked = totalChildSjuk >= FK.FIRST_SJUK_REQUIREMENT;

        const sjukDays = Math.min(daysNeeded, sjukRemaining);
        const lagstaDays = lagstaUnlocked
          ? Math.min(daysNeeded - sjukDays, lagstaRemaining)
          : 0;
        const totalDays = sjukDays + lagstaDays;

        totalLeaveDays += totalDays;
        totalLeaveIncome += sjukDays * sjukRate + lagstaDays * FK.LAGSTA_DAILY;

        if (!leaveByChild[ci]) leaveByChild[ci] = { sjuk: 0, lagsta: 0 };
        leaveByChild[ci].sjuk += sjukDays;
        leaveByChild[ci].lagsta += lagstaDays;

        consumed[ci][pi].sjuk += sjukDays;
        consumed[ci][pi].lagsta += lagstaDays;
      }

      for (const ci in leaveByChild) {
        if (leaveByChild[ci].sjuk > 0 || leaveByChild[ci].lagsta > 0) {
          if (!topupMonths[pi][ci]) topupMonths[pi][ci] = 0;
          topupMonths[pi][ci]++;
        }
      }

      const avgDpw = mDays > 0 ? totalLeaveDays / (mDays / 7) : 0;
      const salary = state.parents[pi].salary;

      const workFraction = mDays > 0
        ? Math.max(0, Math.min(1, paidCalendarDays / mDays))
        : 1;
      const workIncome = workFraction * salary;

      const leaveFrac = mDays > 0
        ? Math.max(0, Math.min(1, (mDays - paidCalendarDays) / mDays))
        : 0;
      let topupIncome = 0;
      for (const tu of state.parents[pi].topups) {
        if (leaveByChild[tu.ci] && topupMonths[pi][tu.ci] <= tu.months) {
          topupIncome += salary * (tu.pct / 100) * leaveFrac;
        }
      }

      const grossIncome = totalLeaveIncome + workIncome + topupIncome;

      const tabellNr = getTabellNr(state.parents[pi].kommun, state.parents[pi].forsamling, state.parents[pi].churchTax);
      const table = tabellNr ? taxCache.tabeller[tabellNr] : null;

      let netIncome = null;
      if (table) {
        const workGross = workIncome + topupIncome;
        const taxOnWork = workGross > 0 ? (lookupTax(workGross, table, 'col1') || 0) : 0;
        const taxOnFK = totalLeaveIncome > 0 ? (lookupTax(totalLeaveIncome, table, 'col1') || 0) : 0;
        netIncome = grossIncome - taxOnWork - taxOnFK;
      }

      return {
        leaveDays: totalLeaveDays,
        leaveIncome: totalLeaveIncome,
        workIncome,
        topupIncome,
        totalIncome: grossIncome,
        netIncome,
        avgDpw,
        leaveByChild,
      };
    });

    return { year, month, parents: parentResults };
  });

  const warnings = generateWarnings(consumed, monthResults);

  return { months: monthResults, consumed, warnings };
}

function generateWarnings(consumed, monthResults) {
  const warnings = [];

  for (const child of state.children) {
    const c0 = consumed[child.id][0], c1 = consumed[child.id][1];
    const totalSjukUsed = c0.sjuk + c1.sjuk;
    const totalLagstaUsed = c0.lagsta + c1.lagsta;

    if (totalSjukUsed > FK.SJUK_DAYS_TOTAL) {
      warnings.push({ type: 'error', msg: `${child.name}: ${Math.round(totalSjukUsed)} sjukpenning days used, but only ${FK.SJUK_DAYS_TOTAL} available.` });
    }
    if (totalLagstaUsed > FK.LAGSTA_DAYS_TOTAL) {
      warnings.push({ type: 'error', msg: `${child.name}: ${Math.round(totalLagstaUsed)} lägsta days used, but only ${FK.LAGSTA_DAYS_TOTAL} available.` });
    }
    for (let pi = 0; pi < 2; pi++) {
      const used = consumed[child.id][pi].sjuk;
      if (used < FK.RESERVED_SJUK && (totalSjukUsed + totalLagstaUsed) >= FK.SJUK_DAYS_TOTAL + FK.LAGSTA_DAYS_TOTAL - 1) {
        warnings.push({ type: 'warn', msg: `${state.parents[pi].name} has only used ${Math.round(used)} sjukpenning days for ${child.name}. ${FK.RESERVED_SJUK} reserved days must be used by this parent.` });
      }
    }

    if (child.birthDate) {
      const bd = parseDate(child.birthDate);
      const fourthBirthday = new Date(bd);
      fourthBirthday.setFullYear(fourthBirthday.getFullYear() + 4);

      const totalAvail = FK.SJUK_DAYS_TOTAL + FK.LAGSTA_DAYS_TOTAL;
      const totalUsed = totalSjukUsed + totalLagstaUsed;
      const remaining = totalAvail - totalUsed;

      if (remaining > FK.SAVE_LIMIT_4YR) {
        const mustUseBy4 = remaining - FK.SAVE_LIMIT_4YR;
        const fourthStr = fourthBirthday.toISOString().slice(0, 10);
        warnings.push({ type: 'warn', msg: `${child.name}: ${Math.round(remaining)} days remain. After ${fourthStr} (4th birthday), only ${FK.SAVE_LIMIT_4YR} can be saved. Use ${Math.round(mustUseBy4)} more days before then.` });
      }
    }
  }

  const sgiChildIds = new Set();
  for (const child of state.children) {
    if (!child.birthDate) continue;
    sgiChildIds.add(child.id);
  }
  if (sgiChildIds.size && monthResults.length) {
    const firstYear = monthResults[0].year;
    const firstMonth = monthResults[0].month;
    const lastMr = monthResults[monthResults.length - 1];
    const lastYear = lastMr.year;
    const lastMonth = lastMr.month;
    const rangeStart = new Date(firstYear, firstMonth - 1, 1);
    const rangeEnd = new Date(lastYear, lastMonth, 0);

    const derivedCache = {};
    for (let yr = firstYear; yr <= lastYear; yr++) derivedCache[yr] = deriveParentalFromRules(yr);
    const vacSets = [vacationDateSetForParent(0), vacationDateSetForParent(1)];

    for (let pi = 0; pi < 2; pi++) {
      const weekFpDays = {};
      const vacSet = vacSets[pi];
      let d = new Date(rangeStart);
      while (d <= rangeEnd) {
        const key = toYMD(d);
        if (!vacSet.has(key)) {
          const derived = derivedCache[d.getFullYear()];
          const slots = resolveParentalSlots(key, derived);
          const s = slots[pi];
          if (s && sgiChildIds.has(s.ci)) {
            const iw = isoWeekNumber(d);
            const wk = iw.year + '-W' + String(iw.week).padStart(2, '0');
            if (!weekFpDays[wk]) weekFpDays[wk] = { days: 0, ci: s.ci, monday: new Date(d) };
            weekFpDays[wk].days += 1;
          }
        }
        d = addDaysDate(d, 1);
      }

      for (const [wk, info] of Object.entries(weekFpDays)) {
        if (info.days >= 5) continue;
        const child = state.children.find(c => c.id === info.ci);
        if (!child || !child.birthDate) continue;
        const bd = parseDate(child.birthDate);
        const firstBirthday = new Date(bd);
        firstBirthday.setFullYear(firstBirthday.getFullYear() + 1);
        if (info.monday < firstBirthday) continue;
        const preschoolStart = child.preschoolDate ? parseDate(child.preschoolDate) : null;
        if (preschoolStart && info.monday >= preschoolStart) continue;

        warnings.push({
          type: 'info',
          msg: `${state.parents[pi].name} tar ${info.days} FP-dagar vecka ${wk} (${child.name} är över 1 år). Färre än 5 dagar/vecka efter barnets 1-årsdag kan påverka SGI-skyddet.`,
        });
      }
    }
  }

  const seen = new Set();
  return warnings.filter(w => {
    if (seen.has(w.msg)) return false;
    seen.add(w.msg);
    return true;
  });
}

// --- RENDERING ---

const COLLAPSED_STORAGE_KEY = 'parplan_collapsedSections';

const collapsedSections = (function () {
  const set = new Set();
  try {
    const raw = localStorage.getItem(COLLAPSED_STORAGE_KEY);
    if (raw) {
      const arr = JSON.parse(raw);
      if (Array.isArray(arr)) arr.forEach(id => set.add(id));
    }
  } catch (_) {}
  return set;
})();

function saveCollapsedState() {
  try {
    localStorage.setItem(COLLAPSED_STORAGE_KEY, JSON.stringify([...collapsedSections]));
  } catch (_) {}
}

function collapsible(id, title, summary, content) {
  const isOpen = !collapsedSections.has(id);
  return `
    <details class="collapsible-section bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden" data-collapsible-id="${esc(id)}" ${isOpen ? 'open' : ''}>
      <summary class="flex items-center justify-between gap-2 px-4 py-3 cursor-pointer list-none select-none hover:bg-slate-50 border-b border-slate-100">
        <span class="font-semibold text-slate-900">${esc(title)}</span>
        <span class="text-sm text-slate-500 truncate flex-1 text-right mx-2">${esc(summary)}</span>
        <span class="collapsible-chevron text-slate-400 text-xs flex-shrink-0">&#9660;</span>
      </summary>
      <div class="p-4 pt-3 border-t-0">${content}</div>
    </details>
  `;
}

document.addEventListener('toggle', function (e) {
  if (e.target.classList && e.target.classList.contains('collapsible-section')) {
    const id = e.target.getAttribute('data-collapsible-id');
    if (id) {
      if (e.target.open) collapsedSections.delete(id);
      else collapsedSections.add(id);
      saveCollapsedState();
    }
  }
}, true);

function summaryChildren() {
  if (!state.children.length) return 'No children';
  return state.children.map(c => {
    const d = c.birthDate ? c.birthDate.slice(0, 7) : '?';
    return `${esc(c.name)} (${d})`;
  }).join(', ');
}

function summaryParents() {
  return state.parents.map(p => `${esc(p.name)}: ${(p.salary / 1000).toFixed(0)}k`).join(', ');
}

function summaryDayPool() {
  if (!state.children.length) return 'No children';
  return state.children.map(c => {
    const u = c.usedDays || [{ sjuk: 0, lagsta: 0 }, { sjuk: 0, lagsta: 0 }];
    const total = (u[0].sjuk || 0) + (u[0].lagsta || 0) + (u[1].sjuk || 0) + (u[1].lagsta || 0);
    return `${esc(c.name)}: ${total} used`;
  }).join(', ');
}

function summaryRules() {
  if (!state.rules.length) return 'No rules';
  const starts = state.rules.map(r => r.start).filter(Boolean).sort();
  const ends = state.rules.map(r => r.end).filter(Boolean).sort((a, b) => b.localeCompare(a));
  const range = starts.length && ends.length ? `${starts[0].slice(0, 7)} – ${ends[0].slice(0, 7)}` : '';
  return `${state.rules.length} rules${range ? ', ' + range : ''}`;
}

function summaryYearlyPlans() {
  if (!state.yearlyPlans || !state.yearlyPlans.length) return 'None';
  return `${state.yearlyPlans.length} plan(s)`;
}

function getCalendarYearRange() {
  const start = Number(state.calendarYearStart) || Number(state.calendarYear) || new Date().getFullYear();
  const endRaw = Number(state.calendarYearEnd) || start;
  const end = endRaw < start ? start : endRaw;
  return { start, end };
}

function getCalendarYearsPlanned() {
  const r = getCalendarYearRange();
  const out = [];
  for (let y = r.start; y <= r.end; y++) out.push(y);
  return out;
}

function summaryYearCalendar() {
  const years = getCalendarYearsPlanned();
  const a = years[0], b = years[years.length - 1];
  let sem0 = 0, sem1 = 0, fp = 0;
  for (const y of years) {
    const st = computeYearCalendarStats(y);
    sem0 += st.vacationWeekdays[0];
    sem1 += st.vacationWeekdays[1];
    fp += Object.values(st.parentalByChild).reduce((x, n) => x + n, 0);
  }
  const label = a === b ? String(a) : `${a}–${b}`;
  return `${label} · sem ${Math.round(sem0)}+${Math.round(sem1)} · FP ${Math.round(fp)} dagar`;
}

function summaryWarnings(warnings) {
  if (!warnings || !warnings.length) return '0 warnings';
  const counts = { error: 0, warn: 0, info: 0 };
  warnings.forEach(w => { counts[w.type] = (counts[w.type] || 0) + 1; });
  const parts = [];
  if (counts.error) parts.push(`${counts.error} error(s)`);
  if (counts.warn) parts.push(`${counts.warn} warning(s)`);
  if (counts.info) parts.push(`${counts.info} info`);
  return parts.join(', ');
}

function summaryDayBalance(consumed) {
  if (!state.children.length) return '—';
  let totalUsed = 0, totalPool = 0;
  for (const c of state.children) {
    const cons = consumed[c.id] || [{ sjuk: 0, lagsta: 0 }, { sjuk: 0, lagsta: 0 }];
    const used = cons[0].sjuk + cons[0].lagsta + cons[1].sjuk + cons[1].lagsta;
    totalUsed += used;
    totalPool += FK.SJUK_DAYS_TOTAL + FK.LAGSTA_DAYS_TOTAL;
  }
  return `${Math.round(totalUsed)}/${totalPool} used`;
}

function summaryRemainingDays(consumed) {
  const children = state.children.filter(c => c.birthDate);
  if (!children.length) return '—';
  let totalRem = 0;
  for (const c of children) {
    const cons = consumed[c.id] || [{ sjuk: 0, lagsta: 0 }, { sjuk: 0, lagsta: 0 }];
    const sjukUsed = cons[0].sjuk + cons[1].sjuk;
    const lagstaUsed = cons[0].lagsta + cons[1].lagsta;
    totalRem += Math.max(0, FK.SJUK_DAYS_TOTAL - sjukUsed) + Math.max(0, FK.LAGSTA_DAYS_TOTAL - lagstaUsed);
  }
  if (totalRem <= 0) return '0 days';
  const years = (totalRem / 480).toFixed(1);
  return `${Math.round(totalRem)} days, ${years} years`;
}

function summaryMonthlyOverview(months) {
  if (!months || !months.length) return '—';
  const first = months[0], last = months[months.length - 1];
  const a = first ? `${monthName(first.month)} ${first.year}` : '';
  const b = last ? `${monthName(last.month)} ${last.year}` : '';
  return `${months.length} months${a && b ? ', ' + a + ' – ' + b : ''}`;
}

  const dayPool = renderChildSetup();
